<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL: Plan de Evaluación 2026 · Audio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0b10;
            --primary-cyan: #00f2ff;
            --primary-magenta: #ff00ff;
            --text-color: #c0caf5;
            --border-glow: 0 0 10px rgba(0, 242, 255, 0.5);
            --neon-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 35, 1) 0%, rgba(5, 5, 10, 1) 100%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 100%, 100% 4px, 3px 100%;
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.1; }
            50% { opacity: 0.02; }
            100% { opacity: 0.08; }
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            border: 2px solid var(--primary-cyan);
            box-shadow: var(--border-glow);
            background: rgba(0, 0, 0, 0.8);
            position: relative;
        }

        h1 {
            text-align: center;
            color: var(--primary-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--primary-cyan);
            border-bottom: 2px solid var(--primary-cyan);
            padding-bottom: 10px;
            margin-top: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
        }

        .eval-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .eval-btn {
            background: transparent;
            border: 1px solid var(--primary-magenta);
            color: var(--primary-magenta);
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 0 0 var(--primary-magenta);
        }

        .eval-btn:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 15px var(--primary-magenta);
            transform: translateY(-2px);
        }

        .eval-btn.active {
            background: var(--primary-magenta);
            color: #000;
            box-shadow: 0 0 20px var(--primary-magenta);
        }

        .eval-btn .weight {
            display: block;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .strategy-panel {
            border: 1px solid var(--primary-cyan);
            padding: 20px;
            background: rgba(0, 242, 255, 0.05);
            min-height: 200px;
            position: relative;
        }

        .strategy-panel h2 {
            font-size: 1.2rem;
            color: var(--primary-cyan);
            margin-top: 0;
            border-bottom: 1px solid var(--primary-cyan);
        }

        #strategy-content {
            font-size: 1rem;
            line-height: 1.5;
            color: #fff;
        }

        .audio-module {
            margin-top: 30px;
            border: 1px solid var(--primary-cyan);
            background: rgba(0, 242, 255, 0.03);
            padding: 18px 20px;
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.3);
            transition: all 0.2s ease;
        }

        .audio-module:hover {
            box-shadow: 0 0 16px rgba(0, 242, 255, 0.5);
            background: rgba(0, 242, 255, 0.07);
        }

        .player-title {
            font-size: 1.1rem;
            color: var(--primary-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-magenta);
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-title::before {
            content: "🎧";
            font-size: 1.2rem;
            filter: drop-shadow(0 0 4px var(--primary-cyan));
        }

        .audio-controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .ctrl-btn {
            background: transparent;
            border: 1px solid var(--primary-magenta);
            color: var(--primary-magenta);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .ctrl-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 12px var(--primary-magenta);
            transform: scale(1.02);
        }

        .ctrl-btn:active {
            transform: scale(0.98);
        }

        .audio-time {
            margin-left: auto;
            font-family: 'Share Tech Mono', monospace;
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 2px;
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .progress-container {
            width: 100%;
            margin-top: 16px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
            border: 0.5px solid var(--primary-cyan);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary-cyan);
            box-shadow: 0 0 4px var(--primary-cyan);
            transition: width 0.05s linear;
        }

        .status-msg {
            font-size: 0.7rem;
            color: #9aa5ce;
            margin-top: 10px;
            text-align: right;
        }

        .help-center {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .special-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: transparent;
            border: 3px solid var(--primary-cyan);
            color: var(--primary-cyan);
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary-cyan);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 2s infinite;
        }

        .special-btn:hover {
            transform: scale(1.1) rotate(15deg);
            background: var(--primary-cyan);
            color: #000;
            box-shadow: 0 0 40px var(--primary-cyan);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px var(--primary-cyan); }
            50% { box-shadow: 0 0 25px var(--primary-cyan); }
            100% { box-shadow: 0 0 10px var(--primary-cyan); }
        }

        .home-btn {
            background: transparent;
            border: 1px solid var(--primary-magenta);
            padding: 12px 24px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: var(--primary-magenta);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .home-btn:hover {
            background: rgba(255, 0, 255, 0.2);
            box-shadow: 0 0 12px var(--primary-magenta);
            transform: scale(1.02);
        }

        .terminal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .terminal-window {
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            border: 2px solid var(--primary-cyan);
            background: #050505;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            color: var(--primary-cyan);
            margin-bottom: 15px;
            font-size: 1.2rem;
            animation: blink 1s step-end infinite;
        }

        .terminal-body {
            color: #00ff41;
            font-size: 1rem;
            line-height: 1.5;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 15px;
            flex: 1;
        }

        .terminal-body::-webkit-scrollbar {
            width: 6px;
            background: #222;
        }
        .terminal-body::-webkit-scrollbar-thumb {
            background: var(--primary-cyan);
            border-radius: 3px;
        }

        .terminal-btn {
            margin-top: 15px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            align-self: flex-start;
        }

        .terminal-btn:hover {
            background: var(--primary-cyan);
            color: #000;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .glitch-effect {
            animation: glitch 0.3s linear;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); color: var(--primary-magenta); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); color: var(--primary-cyan); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .click-hint {
            font-size: 0.7rem;
            color: #888;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>EVALUATION_PLAN_CORE_v2.6</h1>
    
    <div class="layout">
        <section>
            <div class="eval-grid" id="evalGrid"></div>
        </section>
        <aside class="strategy-panel">
            <h2>ESTRATEGIA SELECTA</h2>
            <div id="strategy-content">Seleccione un módulo de evaluación para desplegar datos estratégicos...</div>
        </aside>
    </div>

    <!-- REPRODUCTOR DE AUDIO MEJORADO -->
    <div class="audio-module">
        <div class="player-title">📡 REPRODUCTOR: EVALUACIÓN DE INGLÉS 1</div>
        <div class="audio-controls">
            <button class="ctrl-btn" id="playBtn">▶ PLAY</button>
            <button class="ctrl-btn" id="pauseBtn">⏸ PAUSE</button>
            <button class="ctrl-btn" id="stopBtn">⏹ STOP</button>
            <div class="audio-time">
                <span id="currentTimeDisplay">0:00</span> / <span id="durationDisplay">--:--</span>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar-bg" id="progressBarBg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="status-msg" id="audioStatusMsg">🔍 Cargando archivo de audio...</div>
    </div>

    <div class="help-center">
        <button class="special-btn" id="helpBtn">?</button>
        <a href="index.html" class="home-btn">⌂ VOLVER AL INICIO</a>
    </div>
</div>

<div class="terminal-overlay" id="terminalOverlay">
    <div class="terminal-window" id="terminalWindow">
        <div class="terminal-header" id="terminalHeader">> ESTABLECIENDO CONEXIÓN...</div>
        <div class="terminal-body" id="terminalBody"></div>
        <div class="click-hint" id="clickHint">Haz clic en la pantalla para continuar...</div>
        <button class="terminal-btn" id="closeTerminal" style="display:none">CERRAR TERMINAL</button>
    </div>
</div>

<script>
    // ---------- DATOS DE EVALUACIONES ----------
    const evaluations = [
        { name: "Quick Test", qty: 4, weight: "5%", total: "20%", strategy: "Son pruebas cortas pero constantes. No faltes a clase, ya que representan el 20% total. Es puntaje 'fácil' si mantienes el ritmo semanal." },
        { name: "Masterclass", qty: 1, weight: "5%", total: "5%", strategy: "Enfoque total en la participación. Al ser una sola sesión, tu preparación previa definirá ese 5% de inmediato." },
        { name: "Better Understanding (BU)", qty: 8, weight: "10% c/u", total: "10%", strategy: "Son ejercicios prácticos. Aunque son 8, el peso total es bajo (1.25% cada uno). Úsalos para practicar sin miedo al error." },
        { name: "My Literary Challenge", qty: 4, weight: "15% c/u", total: "15%", strategy: "Proyectos de lectura. Tienen un peso significativo individualmente. Asegúrate de entregar los 4 para asegurar este 15%." },
        { name: "Glosario", qty: 1, weight: "5%", total: "5%", strategy: "Es un trabajo de hormiga. Ve alimentándolo cada semana con términos de las clases para que no se acumule al final." },
        { name: "Inducción", qty: 1, weight: "5%", total: "5%", strategy: "¡Puntos gratis! Solo requiere tu presencia y atención inicial para entender las reglas del juego." },
        { name: "Bitácora", qty: 8, weight: "5% c/u", total: "5%", strategy: "Reflexión constante. Es una evaluación de proceso. Mantenerla al día te garantiza el éxito con poco esfuerzo técnico." },
        { name: "Microconferencia", qty: 1, weight: "5%", total: "5%", strategy: "Habilidades comunicativas. Prepara una estructura clara. Son 5 puntos que dependen de 5-10 minutos de exposición." },
        { name: "Examen Final", qty: 1, weight: "30%", total: "30%", strategy: "El peso pesado. El 30% del curso se define aquí. No lo dejes para el final; usa el glosario y los BU para estudiar progresivamente." }
    ];

    const grid = document.getElementById('evalGrid');
    evaluations.forEach(evalItem => {
        const btn = document.createElement('button');
        btn.className = 'eval-btn';
        btn.innerHTML = `${evalItem.name}<span class="weight">Cant: ${evalItem.qty} | Total: ${evalItem.total}</span>`;
        btn.onclick = () => {
            playTone(440, 0.05, "sine");
            document.querySelectorAll('.eval-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('strategy-content').innerHTML = `<p class="glitch-effect">${evalItem.strategy}</p>`;
        };
        grid.appendChild(btn);
    });

    function playTone(freq, duration, type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    // ---------- REPRODUCTOR DE AUDIO (CORREGIDO) ----------
    const audio = new Audio();
    audio.preload = "metadata";
    audio.src = "Evaluación_de_Inglés_1_para_Ciencias_Administrativas.m4a";
    
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBg = document.getElementById('progressBarBg');
    const currentSpan = document.getElementById('currentTimeDisplay');
    const durationSpan = document.getElementById('durationDisplay');
    const statusMsg = document.getElementById('audioStatusMsg');

    let durationLoaded = false;
    let errorShown = false;

    function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const mins = Math.floor(sec / 60);
        const secs = Math.floor(sec % 60);
        return `${mins}:${secs < 10 ? '0' + secs : secs}`;
    }

    function updateProgress() {
        if (!isNaN(audio.duration) && audio.duration > 0) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + "%";
            currentSpan.innerText = formatTime(audio.currentTime);
            if (!durationLoaded) {
                durationSpan.innerText = formatTime(audio.duration);
                durationLoaded = true;
            }
        } else {
            progressFill.style.width = "0%";
        }
    }

    function handleError() {
        if (errorShown) return;
        errorShown = true;
        let errorMsg = "❌ ERROR: No se pudo cargar el archivo de audio.\n";
        if (audio.error) {
            switch (audio.error.code) {
                case MediaError.MEDIA_ERR_ABORTED: errorMsg += "Carga abortada."; break;
                case MediaError.MEDIA_ERR_NETWORK: errorMsg += "Error de red."; break;
                case MediaError.MEDIA_ERR_DECODE: errorMsg += "Formato no soportado o archivo corrupto."; break;
                case MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED: errorMsg += "Archivo no encontrado o extensión no soportada."; break;
                default: errorMsg += "Error desconocido.";
            }
        } else {
            errorMsg += "Verifica que el archivo 'Evaluación_de_Inglés_1_para_Ciencias_Administrativas.m4a' esté en la misma carpeta que este HTML.";
        }
        statusMsg.innerText = errorMsg;
        statusMsg.style.color = "#ff6699";
        playBtn.disabled = true;
        pauseBtn.disabled = true;
        stopBtn.disabled = true;
    }

    audio.addEventListener('loadedmetadata', () => {
        statusMsg.innerText = "✅ Audio listo. Presiona PLAY.";
        statusMsg.style.color = "#9aa5ce";
        durationSpan.innerText = formatTime(audio.duration);
        durationLoaded = true;
        playBtn.disabled = false;
        pauseBtn.disabled = false;
        stopBtn.disabled = false;
    });
    audio.addEventListener('error', handleError);
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('play', () => statusMsg.innerText = "▶ Reproduciendo...");
    audio.addEventListener('pause', () => statusMsg.innerText = "⏸ Pausado");
    audio.addEventListener('ended', () => {
        statusMsg.innerText = "⏹ Finalizado";
        progressFill.style.width = "0%";
        currentSpan.innerText = "0:00";
    });

    playBtn.addEventListener('click', () => {
        if (audio.src) {
            audio.play().catch(err => {
                statusMsg.innerText = "⚠ No se pudo reproducir: " + (err.message || "verifica el archivo");
                statusMsg.style.color = "#ffaa66";
            });
            playTone(880, 0.1, "sine");
        }
    });
    pauseBtn.addEventListener('click', () => {
        audio.pause();
        playTone(660, 0.08, "sine");
    });
    stopBtn.addEventListener('click', () => {
        audio.pause();
        audio.currentTime = 0;
        updateProgress();
        playTone(330, 0.12, "sawtooth");
        statusMsg.innerText = "⏹ Reiniciado (posición 0:00)";
        setTimeout(() => { if (statusMsg.innerText.includes("Reiniciado")) statusMsg.innerText = "Listo"; }, 1200);
    });

    progressBg.addEventListener('click', (e) => {
        if (!durationLoaded || isNaN(audio.duration)) return;
        const rect = progressBg.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        const newTime = percent * audio.duration;
        if (!isNaN(newTime)) {
            audio.currentTime = newTime;
            updateProgress();
            playTone(520, 0.05, "sine");
        }
    });

    // Forzar carga para detectar errores temprano
    audio.load();

    // ---------- BOTÓN ESPECIAL "?" Y TERMINAL ----------
    const helpBtn = document.getElementById('helpBtn');
    const overlay = document.getElementById('terminalOverlay');
    const termBody = document.getElementById('terminalBody');
    const termHeader = document.getElementById('terminalHeader');
    const closeTerminalBtn = document.getElementById('closeTerminal');
    const termWindow = document.getElementById('terminalWindow');
    let step = 0;
    const masterStrategy = [
        "MENSAJE DEL FUTURO RECIBIDO...\nAnalizando probabilidades de éxito...",
        "ESTRATEGIA PARA APROBAR LA MATERIA:\n\n1. Asegura el 'Piso de Cristal': Inducción, Glosario, Bitácora y Masterclass suman 20% garantizado.",
        "2. Relación Esfuerzo/Puntaje: Los Quick Tests (20%) son vitales. Te preparan para el Examen Final (30%).",
        "3. La Regla del 5: Enfócate en entregar TODO lo que vale 5%. Sumar pequeñas victorias es más seguro.",
        "CONSEJO FINAL: El 70% son evaluaciones continuas. Constancia > perfección.\n\n[FIN DE LA TRANSMISIÓN]"
    ];

    function advanceStrategy() {
        if (step < masterStrategy.length) {
            const p = document.createElement('p');
            p.innerText = masterStrategy[step];
            p.className = 'glitch-effect';
            termBody.appendChild(p);
            termBody.scrollTop = termBody.scrollHeight;
            step++;
            playTone(200 + (step * 100), 0.2, "square");
            if (step === masterStrategy.length) {
                closeTerminalBtn.style.display = 'block';
                document.getElementById('clickHint').style.display = 'none';
            }
        }
    }

    function playFuturisticCharge() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 1.5);
        } catch(e) {}
    }

    helpBtn.onclick = () => {
        playFuturisticCharge();
        overlay.style.display = 'flex';
        termWindow.classList.add('glitch-effect');
        step = 0;
        termBody.innerHTML = "";
        termHeader.innerText = "> SINTONIZANDO SEÑAL...";
        closeTerminalBtn.style.display = 'none';
        document.getElementById('clickHint').style.display = 'block';
        setTimeout(() => {
            termHeader.innerText = "> MENSAJE DEL FUTURO RECIBIDO...";
            advanceStrategy();
        }, 1000);
    };

    termWindow.onclick = (e) => {
        e.stopPropagation();
        if (step < masterStrategy.length) advanceStrategy();
    };
    closeTerminalBtn.onclick = () => overlay.style.display = 'none';
    overlay.onclick = () => { if (closeTerminalBtn.style.display === 'block') overlay.style.display = 'none'; };
</script>
</body>
</html>
