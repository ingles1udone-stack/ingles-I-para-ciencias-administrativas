<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Boletín - Inglés I UDO-NE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Share+Tech+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .udo-blue { color: #003366; }
        .udo-bg-blue { background-color: #003366; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .crt-screen {
            background: #021a02;
            border: 4px solid #1a3a1a;
            box-shadow: inset 0 0 20px #00ff0033, 0 0 10px #00ff0022;
            position: relative;
            overflow: hidden;
        }
        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }
        .matrix-text {
            font-family: 'Share Tech Mono', monospace;
            color: #00ff41;
            text-shadow: 0 0 8px #00ff41aa;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            animation: scanline 6s linear infinite;
            z-index: 3;
        }
        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
        <div class="udo-bg-blue p-6 text-white text-center">
            <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-3 border-2 border-white/20">
                <i class="fas fa-university text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold">Boletín Informativo</h1>
            <p class="text-xs opacity-70 uppercase tracking-widest mt-1">Inglés I - Ciencias Administrativas</p>
        </div>

        <div class="px-6 pt-6">
            <div class="crt-screen rounded-xl p-4 h-32 flex items-center justify-center text-center relative">
                <div class="scanline"></div>
                <p id="caption-text" class="matrix-text text-sm italic uppercase leading-tight">
                    SISTEMA LISTO... <br> PRESIONE PLAY
                </p>
            </div>
        </div>

        <div class="p-8">
            <div id="status" class="text-center mb-6">
                <p class="text-sm font-medium text-slate-500" id="status-text">Listo para iniciar</p>
            </div>

            <div class="flex flex-col items-center gap-6">
                <button id="playBtn" class="w-20 h-20 udo-bg-blue rounded-full text-white text-2xl flex items-center justify-center hover:scale-105 transition-transform shadow-lg disabled:opacity-50 relative group">
                    <i class="fas fa-play ml-1" id="playIcon"></i>
                </button>

                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                    <div id="progress" class="h-full bg-blue-500 w-0 transition-all duration-300"></div>
                </div>

                <div class="flex justify-between w-full text-[10px] font-bold text-slate-400 uppercase">
                    <span>UDO Nueva Esparta</span>
                    <span id="timer">00:00</span>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase">Prof. Oney Clavijo — Mar del Plata</p>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress');
        const captionText = document.getElementById('caption-text');
        const timerText = document.getElementById('timer');

        let audioSource;
        let audioContext;
        let captionsInterval;
        let isPlaying = false;

        const textToSpeak = "Boletín de Bienvenida. ¡Bienvenidos a Inglés 1! En Contaduría y Administración, el inglés es fundamental. Materiales: Diccionario, engrapadora, cuaderno y guías impresas. Evaluaciones: Centro de copiado en Cursos Básicos con la Profesora Carmen. Pida sus exámenes 72 horas antes. Vestimenta: No se permite ropa reveladora ni gorras. ¡Mucho éxito!";

        const captions = [
            { t: 0, txt: "Iniciando Boletín..." },
            { t: 2, txt: "¡Bienvenidos a Inglés 1!" },
            { t: 5, txt: "El inglés es vital en Administración." },
            { t: 8, txt: "Traiga su diccionario y guías." },
            { t: 12, txt: "Exámenes en Cursos Básicos." },
            { t: 15, txt: "Pida sus copias 72 horas antes." },
            { t: 19, txt: "Respete las normas de vestimenta." },
            { t: 23, txt: "¡Mucho éxito en el semestre!" }
        ];

        // Función esencial para convertir el formato de la API a algo que el navegador entienda
        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (os, s) => { for (let i = 0; i < s.length; i++) view.setUint8(os + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return buffer;
        }

        async function startPlayback() {
            try {
                playBtn.disabled = true;
                statusText.innerText = "Conectando con el servidor...";
                captionText.innerText = "> ESTABLECIENDO SEÑAL...";

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Say in a clear professional male voice: " + textToSpeak }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        }
                    })
                });

                if (!response.ok) throw new Error("API_ERROR");

                const result = await response.json();
                const audioBase64 = result.candidates[0].content.parts[0].inlineData.data;
                const sampleRate = 24000;

                const binary = atob(audioBase64);
                const pcm = new Int16Array(binary.length / 2);
                for (let i = 0; i < binary.length; i += 2) {
                    pcm[i / 2] = (binary.charCodeAt(i + 1) << 8) | binary.charCodeAt(i);
                }

                const wavBuffer = pcmToWav(pcm, sampleRate);
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const decoded = await audioContext.decodeAudioData(wavBuffer);

                audioSource = audioContext.createBufferSource();
                audioSource.buffer = decoded;
                audioSource.connect(audioContext.destination);
                
                audioSource.onended = () => {
                    stopPlayback();
                    statusText.innerText = "Transmisión terminada";
                };

                audioSource.start();
                isPlaying = true;
                playIcon.className = "fas fa-stop";
                statusText.innerText = "Transmitiendo...";
                playBtn.disabled = false;

                const start = audioContext.currentTime;
                captionsInterval = setInterval(() => {
                    const now = audioContext.currentTime - start;
                    progressBar.style.width = (now / decoded.duration * 100) + "%";
                    
                    const s = Math.floor(now % 60).toString().padStart(2, '0');
                    timerText.innerText = `00:${s}`;

                    const cap = [...captions].reverse().find(c => now >= c.t);
                    if (cap) captionText.innerText = `> ${cap.txt.toUpperCase()}`;
                }, 100);

            } catch (e) {
                console.error(e);
                statusText.innerText = "Error de conexión";
                captionText.innerText = "> ERROR DE RED";
                playBtn.disabled = false;
            }
        }

        function stopPlayback() {
            if (audioSource) { try { audioSource.stop(); } catch(e) {} }
            clearInterval(captionsInterval);
            isPlaying = false;
            playIcon.className = "fas fa-play ml-1";
            progressBar.style.width = "0%";
            timerText.innerText = "00:00";
            captionText.innerText = "SISTEMA LISTO... \n PRESIONE PLAY";
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) stopPlayback();
            else startPlayback();
        });
    </script>
</body>
</html>
