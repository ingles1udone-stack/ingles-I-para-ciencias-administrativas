<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL UDO-NE: BOLETÍN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --pip-green: #1aff80;
            --pip-green-dim: rgba(26, 255, 128, 0.2);
            --pip-bg: #050a05;
        }

        body {
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: var(--pip-green);
            overflow: hidden;
            margin: 0;
            height: 100vh;
        }

        /* Efecto de Tubo de Rayos Catódicos (CRT) */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 11;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, var(--pip-green-dim) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .terminal-container {
            height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            border: 10px solid #111;
            box-shadow: inset 0 0 50px rgba(26, 255, 128, 0.15);
            position: relative;
        }

        .header {
            border-bottom: 2px solid var(--pip-green);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-area {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .text-block {
            line-height: 1.6;
            font-size: 1.25rem;
            text-shadow: 0 0 5px var(--pip-green);
            white-space: pre-wrap;
        }

        .blinking-cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: var(--pip-green);
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-retro {
            border: 2px solid var(--pip-green);
            padding: 0.5rem 1rem;
            text-transform: uppercase;
            transition: all 0.2s;
            background: transparent;
            color: var(--pip-green);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-retro:hover {
            background: var(--pip-green);
            color: var(--pip-bg);
            box-shadow: 0 0 15px var(--pip-green);
        }

        .footer-nav {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            border-top: 1px solid var(--pip-green-dim);
            padding-top: 1rem;
        }

        .click-hint {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="scanline"></div>

    <div class="terminal-container">
        <!-- Encabezado Estilo Pip-Boy -->
        <div class="header">
            <div>
                <h1 class="text-2xl font-bold tracking-tighter">UDO-OS v4.0.1</h1>
                <p class="text-xs opacity-80">BIENVENIDA_ESTUDIANTE.DOC</p>
            </div>
            <div class="text-right">
                <p id="date-display"></p>
                <p>NUEVA ESPARTA</p>
            </div>
        </div>

        <!-- Área de Texto Progresivo -->
        <div class="content-area" id="terminal-click-area">
            <div id="output" class="text-block">
                <!-- El texto se inyecta aquí -->
            </div>
            <div id="click-prompt" class="mt-8 text-center hidden click-hint text-xl">
                [ CLICK PARA CONTINUAR ]
            </div>
        </div>

        <!-- Navegación Inferior -->
        <div class="footer-nav">
            <div class="flex gap-4">
                <!-- Botón REGRESAR modificado: ahora navega directamente a index.html -->
                <button onclick="window.location.href = 'index.html';" class="btn-retro">
                    <i class="fas fa-arrow-left"></i> REGRESAR
                </button>
                <button onclick="window.location.reload()" class="btn-retro">
                    <i class="fas fa-undo"></i> REINICIAR
                </button>
            </div>
            <div class="flex items-center gap-4">
                <span id="page-indicator">CARGANDO...</span>
                <span class="hidden md:inline opacity-50">RADS [0.00/s]</span>
            </div>
        </div>
    </div>

    <script>
        const fullText = [
            "INICIANDO PROTOCOLO DE BIENVENIDA...\n\n¡Saludos, estudiante! Bienvenido a la asignatura INGLÉS I para Ciencias Administrativas. Has ingresado a un entorno donde el inglés no es solo un idioma, sino tu principal herramienta de análisis financiero y comercial.",
            "MATERIALES REQUERIDOS (NO NEGOCIABLES):\n\n1. Diccionario Inglés-Español (Uso obligatorio en aula).\n2. Engrapadora (Tus documentos deben estar unidos).\n3. Cuaderno de notas y guías impresas.\n4. Kit de escritura (Bolígrafos, lápiz y 3 colores para diagramación).",
            "SISTEMA DE EVALUACIONES:\n\nEl material oficial está en el Centro de Copiado (Cursos Básicos). \nCONTACTO: Prof. Carmen (+58 424 8622137).\n\nADVERTENCIA: Debes solicitar tus exámenes con 72 HORAS de antelación. La falta de previsión resultará en la pérdida de la evaluación.",
            "NORMAS DE CONVIVENCIA (DECORO UDISTA):\n\nEl campus requiere vestimenta adecuada. Prohibido el uso de:\n- Gorras o prendas que cubran el rostro en clase.\n- Ropa reveladora, shorts o franelillas.\n- Piercings visibles.",
            "RECOMENDACIONES PARA EL ÉXITO:\n\n- Estudia el Plan de Clases semanalmente.\n- La asistencia es la clave de la comprensión.\n- No temas preguntar al docente.\n\nTERMINANDO TRANSMISIÓN... ¡ÉXITO EN EL SEMESTRE!"
        ];

        let currentPage = 0;
        let charIndex = 0;
        let isTyping = false;
        const outputElement = document.getElementById('output');
        const clickArea = document.getElementById('terminal-click-area');
        const clickPrompt = document.getElementById('click-prompt');
        const pageIndicator = document.getElementById('page-indicator');

        function typeText() {
            if (charIndex < fullText[currentPage].length) {
                isTyping = true;
                const char = fullText[currentPage].charAt(charIndex);
                outputElement.innerHTML = fullText[currentPage].substring(0, charIndex + 1) + '<span class="blinking-cursor"></span>';
                charIndex++;
                setTimeout(typeText, 25);
            } else {
                isTyping = false;
                outputElement.innerHTML = fullText[currentPage] + '<span class="blinking-cursor"></span>';
                if (currentPage < fullText.length - 1) {
                    clickPrompt.classList.remove('hidden');
                } else {
                    clickPrompt.innerHTML = "[ FIN DEL BOLETÍN ]";
                    clickPrompt.classList.remove('hidden');
                }
            }
        }

        clickArea.addEventListener('click', () => {
            if (isTyping) {
                charIndex = fullText[currentPage].length;
            } else {
                if (currentPage < fullText.length - 1) {
                    currentPage++;
                    charIndex = 0;
                    clickPrompt.classList.add('hidden');
                    updatePageIndicator();
                    typeText();
                }
            }
        });

        function updatePageIndicator() {
            pageIndicator.innerText = `ARCHIVO: ${currentPage + 1} / ${fullText.length}`;
        }

        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            document.getElementById('date-display').innerText = now.toLocaleDateString('es-ES', options).toUpperCase();
        }

        window.onload = () => {
            updateDate();
            updatePageIndicator();
            typeText();
        };
    </script>
</body>
</html>
