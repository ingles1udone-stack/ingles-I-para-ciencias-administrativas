<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Boletín - Inglés I UDO-NE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Share+Tech+Mono&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .udo-blue { color: #003366; }
        .udo-bg-blue { background-color: #003366; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        .crt-screen {
            background: #021a02;
            border: 4px solid #1a3a1a;
            box-shadow: inset 0 0 20px #00ff0033, 0 0 10px #00ff0022;
            position: relative;
            overflow: hidden;
        }
        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }
        .matrix-text {
            font-family: 'Share Tech Mono', monospace;
            color: #00ff41;
            text-shadow: 0 0 8px #00ff41aa;
            line-height: 1.4;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            animation: scanline 6s linear infinite;
            z-index: 3;
        }
        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
        <!-- Encabezado -->
        <div class="udo-bg-blue p-6 text-white text-center">
            <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-3 border-2 border-white/20">
                <i class="fas fa-university text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold">Boletín Informativo</h1>
            <p class="text-xs opacity-70 uppercase tracking-widest mt-1">Inglés I - Ciencias Administrativas</p>
        </div>

        <!-- Pantalla de Subtítulos -->
        <div class="px-6 pt-6">
            <div class="crt-screen rounded-xl p-4 h-32 flex items-center justify-center text-center relative">
                <div class="scanline"></div>
                <p id="caption-text" class="matrix-text text-sm md:text-base italic uppercase">
                    SISTEMA LISTO... <br> PRESIONE PLAY PARA INICIAR
                </p>
                <div class="absolute top-2 right-3 flex gap-1">
                    <div id="recording-dot" class="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                    <span class="text-[8px] text-green-900 font-bold uppercase tracking-tighter">Live Text</span>
                </div>
            </div>
        </div>

        <!-- Controles de Audio -->
        <div class="p-8">
            <div id="status" class="text-center mb-6">
                <p class="text-sm font-medium text-slate-500" id="status-text">Listo para transmitir</p>
            </div>

            <div class="flex flex-col items-center gap-6">
                <!-- Botón Principal -->
                <button id="playBtn" class="w-20 h-20 udo-bg-blue rounded-full text-white text-2xl flex items-center justify-center hover:scale-105 transition-transform shadow-lg disabled:opacity-50 relative group">
                    <i class="fas fa-play ml-1" id="playIcon"></i>
                    <div class="absolute -inset-1 bg-blue-400 rounded-full blur opacity-20 group-hover:opacity-40 transition"></div>
                </button>

                <!-- Barra de Progreso -->
                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden relative">
                    <div id="progress" class="absolute top-0 left-0 h-full bg-blue-500 w-0 transition-all duration-300"></div>
                </div>

                <div class="flex justify-between w-full text-[10px] font-bold text-slate-400 uppercase">
                    <span>UDO Nueva Esparta</span>
                    <span id="timer">00:00</span>
                </div>
            </div>

            <!-- Información Adicional -->
            <div class="mt-8 pt-6 border-t border-slate-100">
                <div class="space-y-3">
                    <div class="flex items-center gap-3 text-sm text-slate-600">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center udo-blue shrink-0">
                            <i class="fas fa-info-circle text-xs"></i>
                        </div>
                        <span class="text-xs">Información vital sobre evaluaciones y materiales de cátedra.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold">PROF. ONEY CLAVIJO — SEMESTRE I-2026</p>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress');
        const captionText = document.getElementById('caption-text');
        const recordingDot = document.getElementById('recording-dot');
        const timerText = document.getElementById('timer');

        let audioSource;
        let audioContext;
        let captionsInterval;
        let isPlaying = false;

        const captions = [
            { time: 0, text: "Iniciando Boletín de Bienvenida..." },
            { time: 3, text: "Bienvenidos a la aventura de Inglés 1." },
            { time: 8, text: "En Contaduría y Administración, el inglés es fundamental." },
            { time: 14, text: "Interpretaremos textos comerciales y contables." },
            { time: 20, text: "Materiales: Diccionario, engrapadora y cuaderno." },
            { time: 26, text: "Recuerde sus lápices, creyones y guías impresas." },
            { time: 32, text: "Evaluaciones: Centro de copiado en Cursos Básicos." },
            { time: 38, text: "Contacto Prof. Carmen: 0412-5454921." },
            { time: 44, text: "¡OJO! Pida sus exámenes 72 horas antes." },
            { time: 50, text: "El incumplimiento causa la pérdida del examen." },
            { time: 56, text: "Vestimenta: No se permite ropa reveladora ni gorras." },
            { time: 62, text: "Estudie, asista a clases y consulte sus dudas." },
            { time: 68, text: "¡Mucho éxito en este semestre!" }
        ];

        const textToSpeak = `
            Diga con voz profesional y clara: 
            Boletín de Bienvenida al curso de Inglés 1 para Ciencias Administrativas de la UDO Nueva Esparta.
            ¡Bienvenidos a la emocionante aventura del Inglés 1! En la Carrera de Contaduría y Administración, el dominio de los textos en inglés es una herramienta fundamental.
            Materiales necesarios: Un diccionario Inglés-Español, una engrapadora, un cuaderno, lápices, 3 creyones y las guías impresas del curso.
            Sobre evaluaciones: El centro de copiado oficial está en Cursos Básicos con la Profesora Carmen al cero cuatro doce, cinco cuatro cinco, cuatro nueve dos uno.
            La reproducción de los exámenes debe solicitarse 72 horas antes. El incumplimiento causará la pérdida de la evaluación.
            Sobre la vestimenta: La UDO no permite ropa reveladora ni gorras en clase.
            Para obtener resultados: Estudie, asista a clases y consulte al profesor. ¡Mucho éxito!
        `;

        // Función para convertir PCM a WAV (Necesario para que el navegador lo entienda bien)
        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) {
                view.setInt16(44 + i * 2, pcmData[i], true);
            }
            return buffer;
        }

        async function fetchAudio() {
            const payload = {
                contents: [{ parts: [{ text: textToSpeak }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Puck" } // Puck suena muy profesional
                        }
                    }
                }
            };

            let retries = 0;
            const delay = (ms) => new Promise(res => setTimeout(res, ms));

            while (retries < 5) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('Retry');
                    return await response.json();
                } catch (e) {
                    retries++;
                    await delay(Math.pow(2, retries) * 1000);
                }
            }
            throw new Error("Fallo de conexión");
        }

        async function startPlayback() {
            try {
                playBtn.disabled = true;
                statusText.innerText = "Sincronizando con satélite...";
                captionText.innerText = "> ESTABLECIENDO CONEXIÓN...";
                
                const result = await fetchAudio();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;
                const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000");

                // Convertir Base64 a Int16Array
                const binary = atob(audioData);
                const pcm = new Int16Array(binary.length / 2);
                for (let i = 0; i < binary.length; i += 2) {
                    pcm[i / 2] = (binary.charCodeAt(i + 1) << 8) | binary.charCodeAt(i);
                }

                const wavBuffer = pcmToWav(pcm, sampleRate);
                
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const decodedBuffer = await audioContext.decodeAudioData(wavBuffer);

                audioSource = audioContext.createBufferSource();
                audioSource.buffer = decodedBuffer;
                audioSource.connect(audioContext.destination);

                audioSource.onended = stopPlayback;

                audioSource.start();
                isPlaying = true;
                playIcon.className = "fas fa-stop";
                statusText.innerText = "Transmisión en vivo";
                recordingDot.classList.replace('bg-slate-500', 'bg-red-500');
                recordingDot.classList.add('animate-pulse');
                playBtn.disabled = false;

                const startTime = audioContext.currentTime;
                captionsInterval = setInterval(() => {
                    const elapsed = audioContext.currentTime - startTime;
                    const progressPercent = (elapsed / decodedBuffer.duration) * 100;
                    
                    progressBar.style.width = Math.min(progressPercent, 100) + "%";
                    
                    const min = Math.floor(elapsed / 60).toString().padStart(2, '0');
                    const sec = Math.floor(elapsed % 60).toString().padStart(2, '0');
                    timerText.innerText = `${min}:${sec}`;

                    const current = [...captions].reverse().find(c => elapsed >= c.time);
                    if (current) captionText.innerText = `> ${current.text.toUpperCase()}`;
                }, 100);

            } catch (error) {
                statusText.innerText = "Error de señal. Reintente.";
                captionText.innerText = "> ERROR: TRANSMISIÓN INTERRUMPIDA";
                playBtn.disabled = false;
            }
        }

        function stopPlayback() {
            if (audioSource) {
                try { audioSource.stop(); } catch(e) {}
            }
            clearInterval(captionsInterval);
            isPlaying = false;
            playIcon.className = "fas fa-play ml-1";
            statusText.innerText = "Transmisión finalizada";
            captionText.innerText = "SISTEMA LISTO... \n PRESIONE PLAY PARA INICIAR";
            recordingDot.classList.replace('bg-red-500', 'bg-slate-500');
            recordingDot.classList.remove('animate-pulse');
            progressBar.style.width = "0%";
            timerText.innerText = "00:00";
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        });
    </script>
</body>
</html>
