<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cockpit: Literary Challenge - Vault-Tec Deep Space</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --phosphor-green: #1aff80;
            --phosphor-amber: #ffb000;
            --panel-gray: #2c2c2c;
            --glass-reflection: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            color: var(--phosphor-green);
        }

        /* --- BACKGROUND: CYBERSPACE --- */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        /* --- COCKPIT STRUCTURE --- */
        #cockpit {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 100%);
        }

        .window-frame {
            position: absolute;
            inset: 0;
            border: 40px solid var(--panel-gray);
            border-bottom-width: 300px;
            box-shadow: inset 0 0 100px rgba(0,0,0,1);
            pointer-events: none;
        }

        .window-frame::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--glass-reflection) 0%, transparent 50%, var(--glass-reflection) 100%);
            z-index: 5;
        }

        /* Rivets */
        .rivet {
            position: absolute;
            width: 10px; height: 10px;
            background: #111;
            border-radius: 50%;
            border: 1px solid #444;
        }

        /* --- DASHBOARD CONTROLS --- */
        #dashboard {
            height: 300px;
            width: 100%;
            background: #1a1a1a;
            border-top: 4px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 40px;
            pointer-events: auto;
            position: relative;
            z-index: 10;
        }

        .crt-monitor {
            width: 500px;
            height: 240px;
            background: #051a05;
            border: 10px solid #333;
            border-radius: 10px;
            box-shadow: inset 0 0 30px rgba(26, 255, 128, 0.5), 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #cube-container {
            width: 150px;
            height: 150px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        #cube-container:hover { transform: scale(1.1); }

        .side-monitor {
            width: 180px;
            height: 200px;
            background: #000;
            border: 4px solid #222;
            padding: 10px;
            font-size: 0.75rem;
            color: var(--phosphor-amber);
            overflow-y: auto;
            box-shadow: inset 0 0 10px var(--phosphor-amber);
        }

        /* --- LEVER --- */
        .lever-base {
            width: 60px;
            height: 120px;
            background: #222;
            border: 2px solid #444;
            position: relative;
            cursor: pointer;
        }
        .lever-handle {
            width: 20px; height: 60px;
            background: #555;
            position: absolute;
            left: 20px; top: 10px;
            transition: all 0.5s;
            border-radius: 5px;
        }
        .lever-handle::after {
            content: "";
            position: absolute;
            top: -10px; left: -5px;
            width: 30px; height: 30px;
            background: #333;
            border-radius: 50%;
            transition: background 0.5s;
        }
        .lever-active .lever-handle { top: 50px; }
        .lever-active .lever-handle::after {
            background: #1aff80;
            box-shadow: 0 0 20px #1aff80;
        }

        /* --- MAPA MENTAL --- */
        #mindmap-svg {
            width: 100%;
            height: 100%;
            display: none;
        }
        .node {
            cursor: pointer;
            transition: fill 0.3s;
        }
        .node:hover circle { fill: var(--phosphor-green); }
        .node:hover text { fill: #000; }

        /* --- FINAL ACTION --- */
        #final-action {
            display: none;
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        .triangle-btn {
            width: 200px;
            height: 180px;
            background: var(--phosphor-green);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            animation: bounce 2s infinite;
        }
        #rainbow-cube { width: 80px; height: 80px; margin-top: 40px; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Scannline effect */
        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body class="crt">

    <!-- Starfield Background -->
    <canvas id="starfield"></canvas>

    <!-- Window Frame -->
    <div class="window-frame">
        <div class="rivet" style="top: 10px; left: 50%"></div>
        <div class="rivet" style="bottom: 10px; left: 50%"></div>
        <div class="rivet" style="top: 50%; left: 10px;"></div>
        <div class="rivet" style="top: 50%; right: 10px;"></div>
    </div>

    <!-- Final Download Button (Triangle) -->
    <div id="final-action">
        <div class="triangle-btn" onclick="location.href='desafio_imprimible.html'">
            <div id="rainbow-cube"></div>
            <span class="absolute bottom-4 text-black font-bold text-xs">DESCARGAR</span>
        </div>
    </div>

    <!-- Cockpit / Dashboard -->
    <div id="cockpit">
        <div id="dashboard">
            
            <!-- Left Info Panel -->
            <div class="side-monitor" id="side-monitor">
                <div class="border-b border-amber-900 mb-2 font-bold">RECOMENDACIÓN HUD</div>
                <div id="side-content">SELECCIONE NODO EN MONITOR PRINCIPAL...</div>
            </div>

            <!-- Central CRT Monitor -->
            <div class="crt-monitor" id="main-monitor">
                <div class="scanlines"></div>
                <div id="cube-container"></div>
                
                <!-- Mindmap SVG (Hidden Initially) -->
                <svg id="mindmap-svg" viewBox="0 0 500 240">
                    <g id="links"></g>
                    <g id="nodes"></g>
                </svg>

                <div id="smart-overlay" class="absolute inset-0 bg-[#051a05] p-4 hidden overflow-y-auto">
                    <h2 class="text-xl underline mb-2">S.M.A.R.T. PROTOCOL</h2>
                    <div id="smart-content" class="text-xs"></div>
                </div>
            </div>

            <!-- Side Toggle Lever -->
            <div class="flex flex-col items-center">
                <div class="text-[10px] mb-1">SMART LINK</div>
                <div class="lever-base" id="smart-lever" onclick="toggleSmart()">
                    <div class="lever-handle"></div>
                </div>
                <div class="text-[10px] mt-1">SAMPLES</div>
            </div>

            <!-- Back Button -->
            <button class="w-16 h-16 bg-red-900 border-4 border-red-500 rounded-lg flex items-center justify-center text-white font-bold hover:bg-red-700 pointer-events-auto" onclick="location.href='index.html'">
                BACK
            </button>
        </div>
    </div>

    <script>
        // --- DATA ---
        const mapNodes = [
            { id: 1, text: "1. Elegir Tema", x: 80, y: 120, info: "Identifique un tema que resuene con su realidad socioeconómica." },
            { id: 2, text: "2. Metas SMART", x: 180, y: 60, info: "Establezca objetivos específicos (Specific) y medibles (Measurable)." },
            { id: 3, text: "3. Personajes", x: 180, y: 180, info: "Cree perfiles con dilemas éticos o profesionales reales." },
            { id: 4, text: "4. Estructura", x: 300, y: 120, info: "Divida la narrativa en Inicio, Nudo y Desenlace Crítico." },
            { id: 5, text: "5. Feedback", x: 420, y: 120, info: "Realice una co-evaluación con sus compañeros de Vault." }
        ];

        const smartSamples = [
            "EJEMPLO A: Completar la lectura técnica en 15 min usando 'Scanning' para identificar 10 términos clave del sector contable.",
            "EJEMPLO B: Redactar un resumen ejecutivo de 2 párrafos que aplique el vocabulario de la Unidad 3 sobre logística internacional.",
            "EJEMPLO C: Desarrollar un diálogo grupal donde se resuelva un conflicto de nómina usando el 100% del vocabulario técnico estudiado."
        ];

        let state = {
            challengeStarted: false,
            leverActive: false,
            nodesClicked: new Set(),
            smartToggleCount: 0
        };

        // --- THREE.JS BACKGROUND ---
        const starCanvas = document.getElementById('starfield');
        const starRenderer = new THREE.WebGLRenderer({ canvas: starCanvas, alpha: true });
        starRenderer.setSize(window.innerWidth, window.innerHeight);
        const starScene = new THREE.Scene();
        const starCamera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        let stars = [];
        const starGeometry = new THREE.SphereGeometry(0.1, 8, 8);
        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

        for(let i=0; i<400; i++){
            let star = new THREE.Mesh(starGeometry, starMaterial);
            star.position.set((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
            starScene.add(star);
            stars.push(star);
        }
        starCamera.position.z = 5;

        // --- THREE.JS CUBE ---
        const cubeScene = new THREE.Scene();
        const cubeCamera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const cubeRenderer = new THREE.WebGLRenderer({ alpha: true });
        cubeRenderer.setSize(150, 150);
        document.getElementById('cube-container').appendChild(cubeRenderer.domElement);

        const cubeGeometry = new THREE.BoxGeometry();
        const cubeMaterial = new THREE.MeshBasicMaterial({ color: 0x1aff80, wireframe: true });
        const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        cubeScene.add(cube);
        cubeCamera.position.z = 2;

        // --- RAINBOW CUBE ---
        const rCubeScene = new THREE.Scene();
        const rCubeRenderer = new THREE.WebGLRenderer({ alpha: true });
        rCubeRenderer.setSize(80, 80);
        document.getElementById('rainbow-cube').appendChild(rCubeRenderer.domElement);
        const rCube = new THREE.Mesh(cubeGeometry, new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true }));
        rCubeScene.add(rCube);

        // --- ANIMATION LOOP ---
        let speedMultiplier = 1;
        function animate() {
            requestAnimationFrame(animate);
            
            // Background motion
            stars.forEach(s => {
                s.position.z += 0.2 * speedMultiplier;
                if(s.position.z > 5) s.position.z = -95;
            });

            cube.rotation.x += 0.05;
            cube.rotation.y += 0.05;

            rCube.rotation.y += 0.1;
            const time = Date.now() * 0.005;
            rCube.material.color.setHSL( (time % 1), 0.8, 0.5 );

            starRenderer.render(starScene, starCamera);
            cubeRenderer.render(cubeScene, cubeCamera);
            rCubeRenderer.render(rCubeScene, cubeCamera);
        }
        animate();

        // --- INTERACTIONS ---
        document.getElementById('cube-container').onclick = function() {
            if(state.challengeStarted) return;
            state.challengeStarted = true;
            this.style.display = 'none';
            document.getElementById('mindmap-svg').style.display = 'block';
            drawMindMap();
        };

        function drawMindMap() {
            const nodesG = document.getElementById('nodes');
            const linksG = document.getElementById('links');
            
            mapNodes.forEach((node, i) => {
                setTimeout(() => {
                    // Draw node
                    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                    g.setAttribute("class", "node");
                    g.onclick = () => selectNode(node);

                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", node.x);
                    circle.setAttribute("cy", node.y);
                    circle.setAttribute("r", 25);
                    circle.setAttribute("fill", "transparent");
                    circle.setAttribute("stroke", "#1aff80");
                    circle.setAttribute("stroke-width", "2");

                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", node.x);
                    text.setAttribute("y", node.y + 5);
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("fill", "#1aff80");
                    text.setAttribute("font-size", "8px");
                    text.textContent = node.text;

                    g.appendChild(circle);
                    g.appendChild(text);
                    nodesG.appendChild(g);

                    // Draw link to next
                    if(i < mapNodes.length - 1) {
                        const next = mapNodes[i+1];
                        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        line.setAttribute("x1", node.x);
                        line.setAttribute("y1", node.y);
                        line.setAttribute("x2", next.x);
                        line.setAttribute("y2", next.y);
                        line.setAttribute("stroke", "#1aff80");
                        line.setAttribute("stroke-width", "1");
                        line.setAttribute("stroke-dasharray", "4");
                        linksG.appendChild(line);
                    }
                }, i * 600);
            });
        }

        function selectNode(node) {
            document.getElementById('side-content').innerText = node.info;
            state.nodesClicked.add(node.id);
            checkCompletion();
        }

        function toggleSmart() {
            state.leverActive = !state.leverActive;
            const lever = document.getElementById('smart-lever');
            const overlay = document.getElementById('smart-overlay');
            const content = document.getElementById('smart-content');

            if(state.leverActive) {
                lever.classList.add('lever-active');
                overlay.classList.remove('hidden');
                state.smartToggleCount++;
                content.innerText = smartSamples[state.smartToggleCount % smartSamples.length];
            } else {
                lever.classList.remove('lever-active');
                overlay.classList.add('hidden');
            }
            checkCompletion();
        }

        function checkCompletion() {
            if(state.nodesClicked.size >= mapNodes.length && state.smartToggleCount > 0) {
                startHyperspace();
            }
        }

        function startHyperspace() {
            speedMultiplier = 15;
            setTimeout(() => {
                document.getElementById('final-action').style.display = 'block';
            }, 2000);
        }

        window.onresize = () => {
            starCamera.aspect = window.innerWidth / window.innerHeight;
            starCamera.updateProjectionMatrix();
            starRenderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
