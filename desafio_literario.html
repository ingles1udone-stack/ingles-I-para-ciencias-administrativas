<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Desafío Literario · Nave Estelar Vault-Tec</title>
    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* evita selecciones accidentales, mejora la experiencia */
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;          /* sin scroll global */
            background: black;
            font-family: 'Share Tech Mono', monospace;
            color: #1aff80;
        }

        /* ========== FONDO ESTELAR ANIMADO (canvas) ========== */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at center, #030d1a 0%, #000000 100%);
        }

        /* ========== CRISTAL DE LA CABINA ========== */
        .cockpit-glass {
            position: absolute;
            inset: 0;
            border: 25px solid #2c2c2c;
            border-bottom-width: 280px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8), 0 0 0 2px #4a4a4a;
            pointer-events: none;
            z-index: 1;
        }
        .cockpit-glass::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, rgba(255,255,255,0.05) 0%, transparent 40%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        /* remaches */
        .rivet {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 50%;
            border: 1px solid #5a5a5a;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* ========== PANEL PRINCIPAL ========== */
        #dashboard {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 280px;
            background: #0f0f12;
            border-top: 3px solid #3a3a3a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 0 20px;
            z-index: 15;
            flex-wrap: wrap;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }

        /* Monitores CRT */
        .monitor {
            background: #071a07;
            border: 6px solid #2d2d2d;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,255,100,0.3), 0 5px 10px black;
            backdrop-filter: blur(1px);
        }

        /* monitor central (grande) */
        .main-monitor {
            width: 500px;
            height: 220px;
            position: relative;
            overflow-y: auto;   /* scroll solo si contenido desborda verticalmente */
            overflow-x: hidden;
            padding: 12px;
            transition: all 0.2s;
        }
        .main-monitor::-webkit-scrollbar {
            width: 6px;
            background: #1a3a1a;
        }
        .main-monitor::-webkit-scrollbar-thumb {
            background: #1aff80;
            border-radius: 4px;
        }

        /* monitor lateral */
        .side-monitor {
            width: 220px;
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            font-size: 12px;
            color: #ffbb77;
            background: #021102;
            border: 3px solid #3a3a3a;
        }
        .side-monitor::-webkit-scrollbar {
            width: 4px;
        }

        /* cubo 3D container */
        .cube-btn {
            width: 130px;
            height: 130px;
            margin: 0 auto;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .cube-btn:hover {
            filter: drop-shadow(0 0 12px #1aff80);
        }

        /* Mindmap SVG */
        #mindmap-svg {
            width: 100%;
            height: 100%;
            display: none;
            background: rgba(5, 15, 5, 0.7);
        }

        /* nodos interactivos */
        .node-group {
            cursor: pointer;
            transition: filter 0.2s;
        }
        .node-group:hover circle {
            stroke: #ffff80;
            filter: drop-shadow(0 0 6px #ffcc44);
        }

        /* overlay SMART */
        .smart-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #032003ee;
            backdrop-filter: blur(2px);
            padding: 18px;
            overflow-y: auto;
            z-index: 20;
            border-radius: 8px;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            color: #f0f0a0;
            display: none;
        }

        /* palanca (toggle) */
        .lever-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .lever-base {
            width: 50px;
            height: 110px;
            background: #1e1e1e;
            border: 2px solid #4a4a4a;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
        }
        .lever-handle {
            width: 20px;
            height: 55px;
            background: #bcbcbc;
            position: absolute;
            left: 13px;
            top: 8px;
            border-radius: 4px;
            transition: top 0.3s ease, background 0.2s;
            box-shadow: 0 2px 5px black;
        }
        .lever-handle::after {
            content: "";
            width: 30px;
            height: 30px;
            background: #3cff6e;
            border-radius: 50%;
            position: absolute;
            top: -12px;
            left: -5px;
            opacity: 0;
            transition: 0.2s;
        }
        .lever-active .lever-handle {
            top: 45px;
        }
        .lever-active .lever-handle::after {
            opacity: 1;
            box-shadow: 0 0 12px #1aff80;
        }

        /* Botón back */
        .back-btn {
            background: #4a1a1a;
            border: 3px solid #b53b3b;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-family: monospace;
            font-weight: bold;
            color: #ffaaaa;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .back-btn:hover {
            background: #8b3a3a;
            transform: scale(1.02);
            color: white;
        }

        /* BOTÓN FINAL (triángulo con cubo arcoíris) */
        #final-launch {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            display: none;
            cursor: pointer;
            filter: drop-shadow(0 0 12px #00ffaa);
            transition: 0.2s;
        }
        .triangle-download {
            width: 210px;
            height: 180px;
            background: radial-gradient(circle at 30% 20%, #21ff6e, #00aa44);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.2s;
        }
        .triangle-download:hover {
            transform: scale(1.05);
        }
        #rainbow-cube-container {
            width: 80px;
            height: 80px;
            margin-top: 20px;
        }
        .download-text {
            font-family: 'VT323', monospace;
            background: black;
            color: #00ffaa;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 1rem;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        /* HIPERESPACIO (animación en cristal) */
        .hyperspace-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            background: radial-gradient(circle, transparent, black);
            mix-blend-mode: screen;
            display: none;
        }
        .streak {
            position: absolute;
            background: linear-gradient(90deg, #aaffff, #66ffff, #22aaff);
            opacity: 0.8;
            filter: blur(2px);
            animation: streakMove 0.8s linear infinite;
        }

        @keyframes streakMove {
            0% { transform: translateX(-100%) translateY(0); opacity: 0.8; }
            100% { transform: translateX(400%) translateY(200px); opacity: 0; }
        }

        /* ajustes responsivos */
        @media (max-width: 950px) {
            .main-monitor { width: 380px; }
            .side-monitor { width: 180px; font-size: 10px; }
            #dashboard { gap: 12px; height: auto; padding: 15px 10px; flex-wrap: wrap; }
            .cube-btn { width: 100px; height: 100px; }
        }
        @media (max-width: 700px) {
            .cockpit-glass { border-width: 12px; border-bottom-width: 220px; }
            #dashboard { flex-direction: column; height: auto; bottom: 0; position: relative; background: #0a0a0c; }
            body { overflow-y: auto; } /* permitimos scroll global en móvil para ver todo */
            .main-monitor { width: 90%; }
        }
        /* en móvil el panel inferior se apila bien */
    </style>
</head>
<body>

    <!-- Canvas de estrellas animado (3D ligero) -->
    <canvas id="stars-canvas"></canvas>

    <!-- Cristales con remaches -->
    <div class="cockpit-glass"></div>
    <div class="rivet" style="top: 20px; left: 15%;"></div>
    <div class="rivet" style="top: 20px; right: 15%;"></div>
    <div class="rivet" style="bottom: 25px; left: 30%;"></div>
    <div class="rivet" style="bottom: 25px; right: 30%;"></div>

    <!-- Contenedor de hiperespacio -->
    <div id="hyperspaceLayer" class="hyperspace-effect"></div>

    <!-- Botón de descarga final (triángulo) -->
    <div id="final-launch">
        <div class="triangle-download" id="downloadBtn">
            <div class="download-text">DESCARGAR DESAFÍO</div>
            <div id="rainbow-cube-container"></div>
        </div>
    </div>

    <!-- PANEL DE CONTROL -->
    <div id="dashboard">
        <!-- Monitor lateral: recomendaciones -->
        <div class="side-monitor monitor">
            <div style="border-bottom: 1px solid #ffaa66; margin-bottom: 8px;">📡 RECOMENDACIÓN</div>
            <div id="recomendacion-text">⚠️ Inicia el desafío tocando el cubo central.</div>
        </div>

        <!-- Monitor principal (contenedor dinámico) -->
        <div class="main-monitor monitor" id="mainMonitor">
            <div id="cube-area" style="display: flex; justify-content: center; align-items: center; height: 100%;">
                <div id="cubeBtn" class="cube-btn"></div>
            </div>
            <svg id="mindmap-svg" viewBox="0 0 560 240"></svg>
            <div id="smartOverlay" class="smart-overlay">
                <h3 style="color:#ffcc66;">📘 OBJETIVOS SMART - EJEMPLOS</h3>
                <div id="smartText"></div>
                <button id="closeSmart" style="margin-top:12px; background:#1a5f1a; border:none; color:white; padding:5px;">CERRAR</button>
            </div>
        </div>

        <!-- Palanca de ejemplos SMART -->
        <div class="lever-control">
            <span style="font-size: 10px;">📊 SMART</span>
            <div id="smartLever" class="lever-base">
                <div class="lever-handle"></div>
            </div>
            <span style="font-size: 9px;">SAMPLES</span>
        </div>

        <!-- Botón Volver -->
        <div class="back-btn" id="backButton">← BACK</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // ---------- 1. CONFIGURACIÓN DE ESCENAS 3D ----------
        // Cubo inicial (verde wireframe) + cubo arcoíris final
        
        // Contenedor principal del cubo inicial
        const cubeContainer = document.getElementById('cubeBtn');
        const cubeScene = new THREE.Scene();
        const cubeCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const cubeRenderer = new THREE.WebGLRenderer({ alpha: true });
        cubeRenderer.setSize(130, 130);
        cubeContainer.appendChild(cubeRenderer.domElement);
        
        const initialCubeMat = new THREE.MeshStandardMaterial({ color: 0x1aff80, emissive: 0x226622, wireframe: false });
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x33ff99, wireframe: true });
        const mainCube = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), wireframeMat);
        cubeScene.add(mainCube);
        // luz para dar profundidad
        const ambientLight = new THREE.AmbientLight(0x224422);
        const pointLight = new THREE.PointLight(0x88ff88, 1);
        pointLight.position.set(2, 3, 4);
        cubeScene.add(ambientLight, pointLight);
        cubeCamera.position.z = 2.3;
        
        // Cubo arcoíris (final)
        const rainbowContainer = document.getElementById('rainbow-cube-container');
        const rainbowScene = new THREE.Scene();
        const rainbowCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const rainbowRenderer = new THREE.WebGLRenderer({ alpha: true });
        rainbowRenderer.setSize(80, 80);
        rainbowContainer.appendChild(rainbowRenderer.domElement);
        const rainbowCubeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x442200 });
        const rainbowCube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), rainbowCubeMat);
        rainbowScene.add(rainbowCube);
        const rLight = new THREE.PointLight(0xffaa66, 1);
        rLight.position.set(1, 2, 3);
        rainbowScene.add(rLight);
        rainbowCamera.position.z = 2;
        
        // Animación continua
        function animateCubes() {
            requestAnimationFrame(animateCubes);
            mainCube.rotation.x += 0.02;
            mainCube.rotation.y += 0.025;
            cubeRenderer.render(cubeScene, cubeCamera);
            
            // arcoíris cambia de color cíclicamente
            const hue = (Date.now() * 0.003) % 1;
            rainbowCubeMat.color.setHSL(hue, 1.0, 0.55);
            rainbowCube.rotation.x += 0.02;
            rainbowCube.rotation.y += 0.03;
            rainbowRenderer.render(rainbowScene, rainbowCamera);
        }
        animateCubes();
        
        // ----- ESTRELLAS DINÁMICAS (efecto túnel) -----
        const starsCanvas = document.getElementById('stars-canvas');
        const ctx = starsCanvas.getContext('2d');
        let starsArray = [];
        function initStars() {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            starsArray = [];
            for(let i=0; i<500; i++) {
                starsArray.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    radius: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.8 + 0.2,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }
        function drawStars() {
            if(!starsCanvas) return;
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, starsCanvas.width, starsCanvas.height);
            for(let s of starsArray) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(100, 255, 150, ${s.alpha * 0.7})`;
                ctx.fill();
                s.y += s.speed;
                if(s.y > starsCanvas.height) {
                    s.y = 0;
                    s.x = Math.random() * starsCanvas.width;
                }
            }
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', () => {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            initStars();
        });
        initStars();
        drawStars();
        
        // ----- VARIABLES DE ESTADO -----
        const mapNodes = [
            { id: 0, text: "1. TEMA", x: 80, y: 80, info: "Elige un tema literario (distopía, ciencia ficción, realismo social) con conexión a tu contexto." },
            { id: 1, text: "2. OBJETIVOS SMART", x: 210, y: 40, info: "Define metas específicas, medibles, alcanzables, relevantes y con tiempo límite." },
            { id: 2, text: "3. PERSONAJES", x: 340, y: 80, info: "Crea arquetipos con motivaciones profundas y conflictos reales." },
            { id: 3, text: "4. ESTRUCTURA", x: 210, y: 170, info: "Inicio, nudo, desenlace. Aplica el viaje del héroe." },
            { id: 4, text: "5. FEEDBACK COLECTIVO", x: 450, y: 150, info: "Comparte borradores, co-evalúa en clase, mejora." }
        ];
        
        let challengeStarted = false;
        let nodesClicked = new Set();
        let smartUsed = false;
        let hyperspaceTriggered = false;
        let finalButtonVisible = false;
        
        // Elementos DOM
        const cubeBtnArea = document.getElementById('cube-area');
        const mindmapSvg = document.getElementById('mindmap-svg');
        const recomendacionDiv = document.getElementById('recomendacion-text');
        const smartLever = document.getElementById('smartLever');
        const smartOverlay = document.getElementById('smartOverlay');
        const smartTextDiv = document.getElementById('smartText');
        const closeSmartBtn = document.getElementById('closeSmart');
        const finalLaunchDiv = document.getElementById('final-launch');
        const backBtn = document.getElementById('backButton');
        
        const smartExamples = [
            "📌 Específico: Escribir 3 relatos cortos sobre la temática 'tecnología y ética'.",
            "📊 Medible: Cada relato debe tener mínimo 500 palabras y usar 15 términos técnicos.",
            "🎯 Alcanzable: Redactar borrador en 1 semana, revisión en grupo la siguiente.",
            "🔗 Relevante: Los textos se publicarán en antología digital de la clase.",
            "⏳ Temporal: Entrega final en 3 semanas antes de la exposición."
        ];
        
        // dibujar mapa mental de forma animada (secuencial)
        function drawMindMapSequential() {
            mindmapSvg.style.display = "block";
            const svgNS = "http://www.w3.org/2000/svg";
            const linksGroup = document.createElementNS(svgNS, "g");
            const nodesGroup = document.createElementNS(svgNS, "g");
            mindmapSvg.innerHTML = '';
            mindmapSvg.appendChild(linksGroup);
            mindmapSvg.appendChild(nodesGroup);
            
            mapNodes.forEach((node, idx) => {
                setTimeout(() => {
                    // dibujar nodo
                    const g = document.createElementNS(svgNS, "g");
                    g.setAttribute("class", "node-group");
                    g.setAttribute("data-id", node.id);
                    const circle = document.createElementNS(svgNS, "circle");
                    circle.setAttribute("cx", node.x);
                    circle.setAttribute("cy", node.y);
                    circle.setAttribute("r", 22);
                    circle.setAttribute("fill", "rgba(0,30,0,0.7)");
                    circle.setAttribute("stroke", "#2aff80");
                    circle.setAttribute("stroke-width", "2");
                    const text = document.createElementNS(svgNS, "text");
                    text.setAttribute("x", node.x);
                    text.setAttribute("y", node.y+5);
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("fill", "#ccffaa");
                    text.setAttribute("font-size", "9");
                    text.textContent = node.text;
                    g.appendChild(circle);
                    g.appendChild(text);
                    
                    g.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if(!nodesClicked.has(node.id)) {
                            nodesClicked.add(node.id);
                            recomendacionDiv.innerHTML = `🔍 ${node.info}`;
                            circle.setAttribute("fill", "#1aff8044");
                            circle.setAttribute("stroke", "#ffff66");
                        } else {
                            recomendacionDiv.innerHTML = `ℹ️ Ya revisaste: ${node.info.substring(0, 80)}`;
                        }
                        verificarCompletado();
                    });
                    nodesGroup.appendChild(g);
                    
                    // conectar con el anterior si existe
                    if(idx > 0) {
                        const prev = mapNodes[idx-1];
                        const line = document.createElementNS(svgNS, "line");
                        line.setAttribute("x1", prev.x);
                        line.setAttribute("y1", prev.y);
                        line.setAttribute("x2", node.x);
                        line.setAttribute("y2", node.y);
                        line.setAttribute("stroke", "#88ff88");
                        line.setAttribute("stroke-width", "1.8");
                        line.setAttribute("stroke-dasharray", "5 3");
                        linksGroup.appendChild(line);
                    }
                }, idx * 550);
            });
        }
        
        // activar desafío al tocar cubo
        function iniciarDesafio() {
            if(challengeStarted) return;
            challengeStarted = true;
            // desaparece el cubo del área principal
            document.getElementById('cube-area').style.display = 'none';
            drawMindMapSequential();
            recomendacionDiv.innerHTML = "✅ Mapa mental activado. Toca cada nodo para revelar recomendaciones...";
        }
        
        // palanca SMART
        let smartOpen = false;
        smartLever.addEventListener('click', () => {
            if(!challengeStarted) {
                recomendacionDiv.innerHTML = "⚠️ Primero activa el cubo central para iniciar el desafío.";
                return;
            }
            smartOpen = !smartOpen;
            if(smartOpen) {
                smartLever.classList.add('lever-active');
                smartOverlay.style.display = "block";
                // mostrar ejemplos aleatorios o todos
                smartTextDiv.innerHTML = smartExamples.map(ex => `<div style="margin-bottom:12px;">${ex}</div>`).join('');
                smartUsed = true;
                verificarCompletado();
            } else {
                smartLever.classList.remove('lever-active');
                smartOverlay.style.display = "none";
            }
        });
        
        closeSmartBtn.addEventListener('click', () => {
            smartOverlay.style.display = "none";
            smartLever.classList.remove('lever-active');
            smartOpen = false;
        });
        
        // verificar si podemos lanzar hiperespacio
        function verificarCompletado() {
            if(hyperspaceTriggered) return;
            const allNodesClicked = nodesClicked.size === mapNodes.length;
            if(allNodesClicked && smartUsed) {
                iniciarHiperespacio();
            }
        }
        
        // Animación de viaje espacial (efecto líneas)
        function iniciarHiperespacio() {
            if(hyperspaceTriggered) return;
            hyperspaceTriggered = true;
            const layer = document.getElementById('hyperspaceLayer');
            layer.style.display = "block";
            // crear 50 líneas dinámicas
            for(let i=0; i<60; i++) {
                const streak = document.createElement('div');
                streak.classList.add('streak');
                const leftPos = Math.random() * 100;
                const width = Math.random() * 40 + 15;
                const height = Math.random() * 3 + 1;
                const duration = Math.random() * 1.2 + 0.5;
                streak.style.position = 'absolute';
                streak.style.left = leftPos + '%';
                streak.style.top = Math.random() * 100 + '%';
                streak.style.width = width + 'px';
                streak.style.height = height + 'px';
                streak.style.animation = `streakMove ${duration}s linear infinite`;
                streak.style.animationDelay = Math.random() * 0.5 + 's';
                layer.appendChild(streak);
            }
            // después de 2.5 segundos aparece el botón de descarga
            setTimeout(() => {
                finalLaunchDiv.style.display = "block";
                // opcional: detener animación de rayas pero se mantiene por estética
            }, 2300);
        }
        
        // Botón de descarga final
        finalLaunchDiv.addEventListener('click', () => {
            // Redirigir a desafio_imprimible.html (simulamos una página con mensajes)
            // Creamos un blob o redirección a una página generada dinámicamente
            const printContent = `
            <!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><title>Desafío Literario - Imprimible</title>
            <style>body { font-family: monospace; background: #f0f0e0; padding: 2rem; } 
            .subliminal { font-size: 7px; color: #aaa; text-align: center; margin-top: 40px; } 
            .task { border: 1px solid #333; margin: 20px; padding: 20px; }</style>
            </head>
            <body>
            <h1>📖 DESAFÍO LITERARIO - BITÁCORA DE TRIPULACIÓN</h1>
