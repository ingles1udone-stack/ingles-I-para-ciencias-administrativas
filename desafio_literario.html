<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MLC: Nave Estelar - Desafío de Lectura Crítica</title>
    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: black;
            font-family: 'Share Tech Mono', monospace;
            color: #1aff80;
        }
        @media (max-width: 700px) {
            body { overflow-y: auto; }
        }

        /* Fondo estelar animado */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at center, #030d1a 0%, #000000 100%);
        }

        /* Cristal de la cabina */
        .cockpit-glass {
            position: absolute;
            inset: 0;
            border: 25px solid #2c2c2c;
            border-bottom-width: 280px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8), 0 0 0 2px #4a4a4a;
            pointer-events: none;
            z-index: 1;
        }
        .cockpit-glass::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, rgba(255,255,255,0.05) 0%, transparent 40%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        .rivet {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 50%;
            border: 1px solid #5a5a5a;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.8);
            z-index: 2;
        }

        /* Panel de mandos */
        #dashboard {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 280px;
            background: #0f0f12;
            border-top: 3px solid #3a3a3a;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 0 20px;
            z-index: 15;
            flex-wrap: wrap;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }
        @media (max-width: 700px) {
            #dashboard {
                position: relative;
                height: auto;
                flex-direction: column;
                padding: 15px;
            }
        }

        /* Monitores */
        .monitor {
            background: #071a07;
            border: 6px solid #2d2d2d;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,255,100,0.3), 0 5px 10px black;
        }
        .main-monitor {
            width: 540px;
            height: 220px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px;
        }
        .main-monitor::-webkit-scrollbar { width: 6px; background: #1a3a1a; }
        .main-monitor::-webkit-scrollbar-thumb { background: #1aff80; border-radius: 4px; }
        .side-monitor {
            width: 240px;
            height: 200px;
            overflow-y: auto;
            padding: 12px;
            font-size: 12px;
            color: #ffbb77;
            background: #021102;
            border: 3px solid #3a3a3a;
        }
        .side-monitor::-webkit-scrollbar { width: 4px; }

        /* Cubo 3D */
        .cube-btn {
            width: 130px;
            height: 130px;
            margin: 0 auto;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .cube-btn:hover { filter: drop-shadow(0 0 12px #1aff80); }

        /* Mapa mental SVG */
        #mindmap-svg {
            width: 100%;
            height: 100%;
            display: none;
            background: rgba(5, 15, 5, 0.7);
        }
        .node-group {
            cursor: pointer;
            transition: filter 0.2s;
        }
        .node-group:hover circle {
            stroke: #ffff80;
            filter: drop-shadow(0 0 6px #ffcc44);
        }

        /* Overlay SMART */
        .smart-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #032003ee;
            backdrop-filter: blur(2px);
            padding: 18px;
            overflow-y: auto;
            z-index: 20;
            border-radius: 8px;
            font-family: 'VT323', monospace;
            font-size: 1rem;
            color: #f0f0a0;
            display: none;
        }

        /* Palanca */
        .lever-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .lever-base {
            width: 50px;
            height: 110px;
            background: #1e1e1e;
            border: 2px solid #4a4a4a;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
        }
        .lever-handle {
            width: 20px;
            height: 55px;
            background: #bcbcbc;
            position: absolute;
            left: 13px;
            top: 8px;
            border-radius: 4px;
            transition: top 0.3s ease, background 0.2s;
            box-shadow: 0 2px 5px black;
        }
        .lever-handle::after {
            content: "";
            width: 30px;
            height: 30px;
            background: #3cff6e;
            border-radius: 50%;
            position: absolute;
            top: -12px;
            left: -5px;
            opacity: 0;
            transition: 0.2s;
        }
        .lever-active .lever-handle { top: 45px; }
        .lever-active .lever-handle::after { opacity: 1; box-shadow: 0 0 12px #1aff80; }

        /* Botón back */
        .back-btn {
            background: #4a1a1a;
            border: 3px solid #b53b3b;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-family: monospace;
            font-weight: bold;
            color: #ffaaaa;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .back-btn:hover { background: #8b3a3a; transform: scale(1.02); color: white; }

        /* Botón final - MEJORADO: texto debajo del cubo */
        #final-launch {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            display: none;
            cursor: pointer;
            filter: drop-shadow(0 0 12px #00ffaa);
            transition: 0.2s;
        }
        .triangle-download {
            width: 230px;
            height: 200px;
            background: radial-gradient(circle at 30% 20%, #21ff6e, #00aa44);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            transition: transform 0.2s;
        }
        .triangle-download:hover { transform: scale(1.05); }
        #rainbow-cube-container {
            width: 80px;
            height: 80px;
            margin-top: 15px;
        }
        .download-text {
            font-family: 'VT323', monospace;
            background: rgba(0,0,0,0.7);
            color: #00ffaa;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-align: center;
            white-space: nowrap;
        }
        @media (max-width: 500px) {
            .download-text { font-size: 0.8rem; white-space: normal; padding: 4px 8px; }
            .triangle-download { width: 200px; height: 180px; }
            #rainbow-cube-container { width: 65px; height: 65px; }
        }

        /* Hiperespacio */
        .hyperspace-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            background: radial-gradient(circle, transparent, black);
            mix-blend-mode: screen;
            display: none;
        }
        .streak {
            position: absolute;
            background: linear-gradient(90deg, #aaffff, #66ffff, #22aaff);
            opacity: 0.8;
            filter: blur(2px);
            animation: streakMove 0.8s linear infinite;
        }
        @keyframes streakMove {
            0% { transform: translateX(-100%) translateY(0); opacity: 0.8; }
            100% { transform: translateX(400%) translateY(200px); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="stars-canvas"></canvas>
    <div class="cockpit-glass"></div>
    <div class="rivet" style="top: 20px; left: 15%;"></div>
    <div class="rivet" style="top: 20px; right: 15%;"></div>
    <div class="rivet" style="bottom: 25px; left: 30%;"></div>
    <div class="rivet" style="bottom: 25px; right: 30%;"></div>
    <div id="hyperspaceLayer" class="hyperspace-effect"></div>
    <div id="final-launch">
        <div class="triangle-download" id="downloadBtn">
            <div id="rainbow-cube-container"></div>
            <div class="download-text">DESCARGAR GUÍA MLC</div>
        </div>
    </div>

    <div id="dashboard">
        <div class="side-monitor monitor">
            <div style="border-bottom: 1px solid #ffaa66; margin-bottom: 8px;">📡 RECOMENDACIÓN MLC</div>
            <div id="recomendacion-text">⚡ Inicia el desafío tocando el cubo central.</div>
        </div>
        <div class="main-monitor monitor" id="mainMonitor">
            <div id="cube-area" style="display: flex; justify-content: center; align-items: center; height: 100%;">
                <div id="cubeBtn" class="cube-btn"></div>
            </div>
            <svg id="mindmap-svg" viewBox="0 0 580 260"></svg>
            <div id="smartOverlay" class="smart-overlay">
                <h3 style="color:#ffcc66;">🎯 OBJETIVOS SMART (Ejemplos oficiales)</h3>
                <div id="smartText"></div>
                <button id="closeSmart" style="margin-top:12px; background:#1a5f1a; border:none; color:white; padding:5px;">CERRAR</button>
            </div>
        </div>
        <div class="lever-control">
            <span style="font-size: 10px;">📊 SMART</span>
            <div id="smartLever" class="lever-base"><div class="lever-handle"></div></div>
            <span style="font-size: 9px;">EJEMPLOS</span>
        </div>
        <div class="back-btn" id="backButton">← BACK</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // === Configuración 3D: Cubo inicial y cubo arcoíris ===
        const cubeContainer = document.getElementById('cubeBtn');
        const cubeScene = new THREE.Scene();
        const cubeCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const cubeRenderer = new THREE.WebGLRenderer({ alpha: true });
        cubeRenderer.setSize(130, 130);
        cubeContainer.appendChild(cubeRenderer.domElement);
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x33ff99, wireframe: true });
        const mainCube = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), wireframeMat);
        cubeScene.add(mainCube);
        const ambientLight = new THREE.AmbientLight(0x224422);
        const pointLight = new THREE.PointLight(0x88ff88, 1);
        pointLight.position.set(2, 3, 4);
        cubeScene.add(ambientLight, pointLight);
        cubeCamera.position.z = 2.3;

        const rainbowContainer = document.getElementById('rainbow-cube-container');
        const rainbowScene = new THREE.Scene();
        const rainbowCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const rainbowRenderer = new THREE.WebGLRenderer({ alpha: true });
        rainbowRenderer.setSize(80, 80);
        rainbowContainer.appendChild(rainbowRenderer.domElement);
        const rainbowCubeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x442200 });
        const rainbowCube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), rainbowCubeMat);
        rainbowScene.add(rainbowCube);
        const rLight = new THREE.PointLight(0xffaa66, 1);
        rLight.position.set(1, 2, 3);
        rainbowScene.add(rLight);
        rainbowCamera.position.z = 2;

        function animateCubes() {
            requestAnimationFrame(animateCubes);
            mainCube.rotation.x += 0.02;
            mainCube.rotation.y += 0.025;
            cubeRenderer.render(cubeScene, cubeCamera);
            const hue = (Date.now() * 0.003) % 1;
            rainbowCubeMat.color.setHSL(hue, 1.0, 0.55);
            rainbowCube.rotation.x += 0.02;
            rainbowCube.rotation.y += 0.03;
            rainbowRenderer.render(rainbowScene, rainbowCamera);
        }
        animateCubes();

        // === Estrellas animadas (fondo) ===
        const starsCanvas = document.getElementById('stars-canvas');
        const ctx = starsCanvas.getContext('2d');
        let starsArray = [];
        function initStars() {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            starsArray = [];
            for(let i=0; i<500; i++) {
                starsArray.push({
                    x: Math.random() * starsCanvas.width,
                    y: Math.random() * starsCanvas.height,
                    radius: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.8 + 0.2,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }
        function drawStars() {
            if(!starsCanvas) return;
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, starsCanvas.width, starsCanvas.height);
            for(let s of starsArray) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
                ctx.fillStyle = `rgba(100, 255, 150, ${s.alpha * 0.7})`;
                ctx.fill();
                s.y += s.speed;
                if(s.y > starsCanvas.height) {
                    s.y = 0;
                    s.x = Math.random() * starsCanvas.width;
                }
            }
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', () => {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            initStars();
        });
        initStars();
        drawStars();

        // ========== DATOS DEL DESAFÍO (Basado en Guía MLC) ==========
        const mapNodes = [
            { id: 0, text: "FASE 0: EQUIPO", x: 80, y: 80,
              info: "📋 Asignen roles: Coordinador (tiempos), Secretario (registro), Supervisor (calidad). Establezcan tiempos: Pre (10'), Durante (25'), Post (40')." },
            { id: 1, text: "FASE 1: PRE-LECTURA", x: 220, y: 40,
              info: "🎯 1. Compromiso SMART: definan S-M-T. 2. Brainstorming: 5 palabras clave, expliquen 1 relevante para Contaduría/Administración. 3. Preguntas previas: 3 preguntas basadas en título, justifiquen 1." },
            { id: 2, text: "FASE 2: DURANTE", x: 360, y: 80,
              info: "🔍 1. Conectores: localicen 3, clasifiquen y reescriban una oración cambiando conector. 2. Estructura: oración introductoria, desarrollo, conclusión (primeras palabras). 3. Tipo textual: narrativo/descriptivo/expositivo/argumentativo, justifiquen. 4. Análisis de argumentos: tesis, tipo de argumento, evaluación." },
            { id: 3, text: "FASE 3: POST-LECTURA", x: 220, y: 170,
              info: "✍️ 1. Síntesis creativa: título creativo + 3 ideas principales (bullet points). 2. Pedagogía: explicar concepto central para niño de 12 años. 3. Intención del autor: frase clave. 4. Preguntas nivel experto: 2 preguntas profundas con respuestas." },
            { id: 4, text: "ORGANIZADOR GRÁFICO", x: 480, y: 160,
              info: "📊 Elijan UNO: mapa conceptual, diagrama de Ishikawa, línea de tiempo, o tabla comparativa. Autoevalúen (1-5); si <4, corrijan. Este será su entregable final." }
        ];

        // Ejemplos SMART extraídos del PDF
        const smartExamples = [
            "🔹 Ejemplo A (Calidad técnica): \"Lograr una calificación alta asegurando que las 10 palabras de brainstorming y el Mapa Conceptual reflejen correctamente el contexto económico actual de nuestra región, terminando toda la guía 10 minutos antes de que acabe la clase para repasar la Pregunta Integradora.\"",
            "🔸 Ejemplo B (Eficiencia): \"Completar la fase de Durante la Lectura en 20 minutos, identificando con precisión los conectores de contraste y causa-efecto para que todos los miembros del grupo puedan explicar la tesis principal del autor si el docente nos pregunta.\"",
            "🔹 Ejemplo C (Aplicación profesional): \"Desarrollar un Diagrama de Ishikawa que proponga una solución real a un problema contable, usando al menos 5 términos técnicos en inglés aprendidos en el texto, dedicando máximo 15 minutos a esta sección.\""
        ];

        let challengeStarted = false;
        let nodesClicked = new Set();
        let smartUsed = false;
        let hyperspaceTriggered = false;

        const cubeBtnArea = document.getElementById('cube-area');
        const mindmapSvg = document.getElementById('mindmap-svg');
        const recomendacionDiv = document.getElementById('recomendacion-text');
        const smartLever = document.getElementById('smartLever');
        const smartOverlay = document.getElementById('smartOverlay');
        const smartTextDiv = document.getElementById('smartText');
        const closeSmartBtn = document.getElementById('closeSmart');
        const finalLaunchDiv = document.getElementById('final-launch');
        const backBtn = document.getElementById('backButton');

        // Dibujar mapa mental secuencial (nodos + conexiones)
        function drawMindMapSequential() {
            mindmapSvg.style.display = "block";
            const svgNS = "http://www.w3.org/2000/svg";
            const linksGroup = document.createElementNS(svgNS, "g");
            const nodesGroup = document.createElementNS(svgNS, "g");
            mindmapSvg.innerHTML = '';
            mindmapSvg.appendChild(linksGroup);
            mindmapSvg.appendChild(nodesGroup);

            mapNodes.forEach((node, idx) => {
                setTimeout(() => {
                    const g = document.createElementNS(svgNS, "g");
                    g.setAttribute("class", "node-group");
                    g.setAttribute("data-id", node.id);
                    const circle = document.createElementNS(svgNS, "circle");
                    circle.setAttribute("cx", node.x);
                    circle.setAttribute("cy", node.y);
                    circle.setAttribute("r", 24);
                    circle.setAttribute("fill", "rgba(0,30,0,0.7)");
                    circle.setAttribute("stroke", "#2aff80");
                    circle.setAttribute("stroke-width", "2");
                    const text = document.createElementNS(svgNS, "text");
                    text.setAttribute("x", node.x);
                    text.setAttribute("y", node.y+5);
                    text.setAttribute("text-anchor", "middle");
                    text.setAttribute("fill", "#ccffaa");
                    text.setAttribute("font-size", "8");
                    text.textContent = node.text;
                    g.appendChild(circle);
                    g.appendChild(text);

                    g.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if(!nodesClicked.has(node.id)) {
                            nodesClicked.add(node.id);
                            recomendacionDiv.innerHTML = `📖 ${node.info}`;
                            circle.setAttribute("fill", "#1aff8044");
                            circle.setAttribute("stroke", "#ffff66");
                        } else {
                            recomendacionDiv.innerHTML = `ℹ️ Ya revisaste: ${node.info.substring(0, 100)}...`;
                        }
                        verificarCompletado();
                    });
                    nodesGroup.appendChild(g);

                    if(idx > 0) {
                        const prev = mapNodes[idx-1];
                        const line = document.createElementNS(svgNS, "line");
                        line.setAttribute("x1", prev.x);
                        line.setAttribute("y1", prev.y);
                        line.setAttribute("x2", node.x);
                        line.setAttribute("y2", node.y);
                        line.setAttribute("stroke", "#88ff88");
                        line.setAttribute("stroke-width", "1.8");
                        line.setAttribute("stroke-dasharray", "5 3");
                        linksGroup.appendChild(line);
                    }
                }, idx * 550);
            });
        }

        function iniciarDesafio() {
            if(challengeStarted) return;
            challengeStarted = true;
            document.getElementById('cube-area').style.display = 'none';
            drawMindMapSequential();
            recomendacionDiv.innerHTML = "✅ Mapa de fases activado. Toca cada nodo para ver los pasos detallados de la Guía MLC.";
        }

        // Palanca SMART
        let smartOpen = false;
        smartLever.addEventListener('click', () => {
            if(!challengeStarted) {
                recomendacionDiv.innerHTML = "⚠️ Primero activa el cubo central para iniciar el desafío.";
                return;
            }
            smartOpen = !smartOpen;
            if(smartOpen) {
                smartLever.classList.add('lever-active');
                smartOverlay.style.display = "block";
                smartTextDiv.innerHTML = smartExamples.map(ex => `<div style="margin-bottom: 16px;">${ex}</div>`).join('');
                smartUsed = true;
                verificarCompletado();
            } else {
                smartLever.classList.remove('lever-active');
                smartOverlay.style.display = "none";
            }
        });
        closeSmartBtn.addEventListener('click', () => {
            smartOverlay.style.display = "none";
            smartLever.classList.remove('lever-active');
            smartOpen = false;
        });

        function verificarCompletado() {
            if(hyperspaceTriggered) return;
            const allNodesClicked = nodesClicked.size === mapNodes.length;
            if(allNodesClicked && smartUsed) {
                iniciarHiperespacio();
            }
        }

        function iniciarHiperespacio() {
            if(hyperspaceTriggered) return;
            hyperspaceTriggered = true;
            const layer = document.getElementById('hyperspaceLayer');
            layer.style.display = "block";
            for(let i=0; i<70; i++) {
                const streak = document.createElement('div');
                streak.classList.add('streak');
                streak.style.left = Math.random() * 100 + '%';
                streak.style.top = Math.random() * 100 + '%';
                streak.style.width = (Math.random() * 50 + 15) + 'px';
                streak.style.height = (Math.random() * 3 + 1) + 'px';
                streak.style.animationDuration = (Math.random() * 1.2 + 0.5) + 's';
                streak.style.animationDelay = Math.random() * 0.6 + 's';
                layer.appendChild(streak);
            }
            setTimeout(() => {
                finalLaunchDiv.style.display = "block";
            }, 2200);
        }

        // ========== SONIDO THEREMIN PARA EL CUBO FINAL ==========
        let audioCtx = null;
        let currentOsc = null;
        let currentGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTheremin(frequency, duration, volume = 0.3) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = frequency;
            gain.gain.value = volume;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + duration);
            return { osc, gain };
        }

        function hoverTheremin() {
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            playTheremin(440, 0.4, 0.15);
            playTheremin(660, 0.5, 0.12);
        }

        function clickTheremin() {
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            playTheremin(880, 0.2, 0.25);
            setTimeout(() => playTheremin(660, 0.3, 0.2), 100);
            setTimeout(() => playTheremin(440, 0.5, 0.15), 300);
        }

        // Aplicar eventos al botón final (cuando aparezca)
        const finalButton = document.getElementById('downloadBtn');
        finalButton.addEventListener('mouseenter', hoverTheremin);
        finalButton.addEventListener('click', (e) => {
            e.stopPropagation();
            clickTheremin();
            // Abrir el enlace de Google Drive directamente
            window.open('https://drive.google.com/file/d/1sRWOwKMrADIc7Szb6IH9CEa6dLfPe7Fv/view?usp=drive_link', '_blank');
        });

        // También aseguramos que el contenedor final no tenga otro handler conflictivo
        finalLaunchDiv.addEventListener('click', (e) => {
            // Si el clic es en el botón, ya lo maneja finalButton; si no, redirigimos igual
            if (!e.target.closest('#downloadBtn')) {
                window.open('https://drive.google.com/file/d/1sRWOwKMrADIc7Szb6IH9CEa6dLfPe7Fv/view?usp=drive_link', '_blank');
            }
        });

        backBtn.addEventListener('click', () => window.location.href = 'index.html');
        document.getElementById('cubeBtn').addEventListener('click', iniciarDesafio);

        // Scroll suave en monitores
        const mainMon = document.querySelector('.main-monitor');
        mainMon?.addEventListener('wheel', (e) => { e.stopPropagation(); mainMon.scrollTop += e.deltaY * 0.8; }, { passive: false });
        const sideMon = document.querySelector('.side-monitor');
        sideMon?.addEventListener('wheel', (e) => { e.stopPropagation(); sideMon.scrollTop += e.deltaY; }, { passive: false });
    </script>
</body>
</html>
