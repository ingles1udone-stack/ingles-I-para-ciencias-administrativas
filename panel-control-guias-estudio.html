<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Guías - University Critical Thinking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        :root {
            --phosphor-green: #00ff41;
            --dark-green: #003b00;
            --bg-black: #050505;
            --emergency-yellow: #ffcc00;
            --emergency-dark: #b88600;
        }

        body {
            background-color: var(--bg-black);
            color: var(--phosphor-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Efecto CRT Scanlines */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .screen {
            position: relative;
            width: 95vw;
            height: 95vh;
            border: 4px solid var(--dark-green);
            border-radius: 20px;
            box-shadow: inset 0 0 50px rgba(0, 255, 65, 0.1), 0 0 20px rgba(0, 255, 65, 0.2);
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            padding: 60px 20px 100px 20px;
            box-sizing: border-box;
        }

        /* Estilo de los Botones de Guía */
        .guide-btn {
            background: rgba(0, 59, 0, 0.2);
            border: 2px solid var(--phosphor-green);
            border-radius: 10px;
            color: var(--phosphor-green);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            position: relative;
            z-index: 10;
        }

        .guide-btn:hover {
            background: var(--phosphor-green);
            color: black;
            box-shadow: 0 0 20px var(--phosphor-green);
            transform: scale(1.05);
        }

        .guide-btn span {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Botón Regresar */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 5px 15px;
            border: 1px solid var(--phosphor-green);
            font-size: 0.8rem;
            text-decoration: none;
            color: var(--phosphor-green);
            z-index: 110;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--phosphor-green);
            color: black;
            box-shadow: 0 0 10px var(--phosphor-green);
        }

        /* Botón de Emergencia: Modelos de Examen */
        .emergency-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 50;
        }

        .emergency-btn {
            width: 110px;
            height: 110px;
            background: var(--emergency-dark);
            border-radius: 50%;
            border: 6px solid #333;
            box-shadow: 0 8px 0 #111, 0 15px 25px rgba(0,0,0,0.5);
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            outline: none;
            text-decoration: none;
            overflow: hidden;
        }
        
        /* === NUEVA ANIMACIÓN RETRO-FUTURISTA PARA EL BOTÓN AMARILLO === */
        .emergency-btn:hover {
            transform: scale(1.12) rotate(3deg);
            box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.8), 0 0 30px 8px #ffcc00, 0 8px 12px rgba(0,0,0,0.3);
            border-color: #ffdd88;
            filter: brightness(1.1) saturate(1.3);
            transition: all 0.12s ease-out;
        }
        
        /* Efecto pulsante sutil al hover, añade un glow interno */
        .emergency-btn:hover::before {
            background: radial-gradient(circle at 30% 30%, #ffdd66, #ffaa22);
            box-shadow: inset 0 0 15px rgba(255,255,200,0.9);
        }
        
        .emergency-btn:hover::after {
            text-shadow: 0 0 8px black, 0 0 12px white;
            font-size: 68px;
            transition: font-size 0.1s;
        }

        /* El símbolo (!) */
        .emergency-btn::after {
            content: "!";
            position: absolute;
            color: black;
            font-size: 60px;
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            z-index: 2;
            text-shadow: 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.1s;
        }

        .emergency-btn::before {
            content: "";
            position: absolute;
            width: 90%;
            height: 90%;
            background: radial-gradient(circle at 30% 30%, var(--emergency-yellow), var(--emergency-dark));
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
            transition: all 0.2s;
        }

        .emergency-btn:active {
            transform: translateY(4px) rotate(1deg);
            box-shadow: 0 4px 0 #111, 0 10px 15px rgba(0,0,0,0.5);
        }

        .emergency-label {
            margin-top: 12px;
            font-weight: 700;
            color: var(--emergency-yellow);
            font-size: 0.9rem;
            text-shadow: 0 0 8px var(--emergency-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
        }
        
        .emergency-container:hover .emergency-label {
            text-shadow: 0 0 12px #ffcc00, 0 0 5px #ffaa33;
            letter-spacing: 3px;
        }

        /* Animación del Personaje (Mascota) */
        .mascot-container {
            grid-column: 2;
            grid-row: 1 / span 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding-bottom: 120px;
        }

        #mascot-svg {
            width: 100%;
            max-width: 380px;
            filter: drop-shadow(0 0 10px var(--phosphor-green));
        }

        /* Animaciones específicas del SVG */
        .eye-pupil {
            animation: lookAround 5s infinite;
        }

        @keyframes lookAround {
            0%, 10% { transform: translate(0, 0); }
            15%, 25% { transform: translate(3px, -2px); }
            30%, 45% { transform: translate(-3px, 1px); }
            50%, 60% { transform: translate(0, 2px); }
            65%, 100% { transform: translate(0, 0); }
        }

        .arm-wave {
            transform-origin: 80% 60%;
            animation: wave 3s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-15deg); }
        }

        .header-text {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--phosphor-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Posicionamiento de botones */
        .btn-1 { grid-column: 1; grid-row: 1; }
        .btn-2 { grid-column: 1; grid-row: 2; }
        .btn-3 { grid-column: 1; grid-row: 3; }
        .btn-4 { grid-column: 1; grid-row: 4; }
        .btn-5 { grid-column: 3; grid-row: 1; }
        .btn-6 { grid-column: 3; grid-row: 2; }
        .btn-7 { grid-column: 3; grid-row: 3; }
        .btn-8 { grid-column: 3; grid-row: 4; }

    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <a href="https://ingles1udone-stack.github.io/ingles-I-para-ciencias-administrativas/index.html" class="back-btn">
        < REGRESAR
    </a>

    <div class="screen">
        <div class="header-text">DECODE THE TEXT & ANALYSIS PROTOCOL</div>

        <!-- Botones Izquierda -->
        <a href="QSG_Unit_1.html" class="guide-btn btn-1">GUÍA 1 <span>Introduction</span></a>
        <a href="QSG_Unit_2.html" class="guide-btn btn-2">GUÍA 2 <span>Grammar I</span></a>
        <a href="QSG_Unit_3.html" class="guide-btn btn-3">GUÍA 3 <span>Vocabulary</span></a>
        <a href="QSG_Unit_4.html" class="guide-btn btn-4">GUÍA 4 <span>Syntax</span></a>

        <!-- Mascota Central Animada -->
        <div class="mascot-container">
            <svg id="mascot-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <!-- Cuerpo del libro -->
                <rect x="100" y="80" width="200" height="240" rx="15" fill="none" stroke="#00ff41" stroke-width="8" />
                <path d="M100 80 L110 70 L310 70 L300 80" fill="none" stroke="#00ff41" stroke-width="4" />
                <path d="M300 80 L310 70 L310 310 L300 320" fill="none" stroke="#00ff41" stroke-width="4" />
                
                <!-- Circuitos decorativos -->
                <path d="M110 100 H140 M110 120 H130 M110 300 H150" stroke="#00ff41" stroke-width="2" opacity="0.6"/>
                
                <!-- Lentes -->
                <circle cx="160" cy="160" r="30" fill="none" stroke="#00ff41" stroke-width="4" />
                <circle cx="240" cy="160" r="30" fill="none" stroke="#00ff41" stroke-width="4" />
                <path d="M190 160 H210" stroke="#00ff41" stroke-width="4" />

                <!-- Ojos (Pupilas animadas) -->
                <g class="eye-pupil">
                    <circle cx="165" cy="160" r="8" fill="#00ff41" />
                    <circle cx="245" cy="160" r="8" fill="#00ff41" />
                </g>

                <!-- Boca (Sonrisa) -->
                <path d="M170 210 Q200 230 230 210" fill="none" stroke="#00ff41" stroke-width="4" stroke-linecap="round" />

                <!-- Brazo saludando -->
                <g class="arm-wave">
                    <path d="M300 220 C340 220 360 180 350 150" fill="none" stroke="#00ff41" stroke-width="6" />
                    <circle cx="350" cy="150" r="10" fill="#00ff41" />
                </g>

                <!-- Brazo sosteniendo -->
                <path d="M100 220 C60 220 40 250 50 280" fill="none" stroke="#00ff41" stroke-width="6" />

                <!-- Libro abierto estático -->
                <g transform="translate(140, 250)">
                    <rect x="0" y="0" width="120" height="40" fill="none" stroke="#00ff41" stroke-width="3" />
                    <line x1="60" y1="0" x2="60" y2="40" stroke="#00ff41" stroke-width="3" />
                    <text x="5" y="25" fill="#00ff41" font-size="8" font-family="monospace">DECODE</text>
                    <text x="70" y="25" fill="#00ff41" font-size="8" font-family="monospace">READ</text>
                </g>

                <!-- Etiquetas de texto -->
                <rect x="130" y="340" width="140" height="30" fill="#00ff41" />
                <text x="140" y="360" fill="black" font-size="12" font-weight="bold">LMS UNIT V1.0</text>
            </svg>
            
            <div class="mt-4 text-center">
                <p class="text-xs">[STATUS: ONLINE]</p>
                <p class="text-xs">BIENVENIDO, ESTUDIANTE</p>
            </div>
        </div>

        <!-- Botones Derecha -->
        <a href="QSG_Unit_5.html" class="guide-btn btn-5">GUÍA 5 <span>Contextualize</span></a>
        <a href="QSG_Unit_6.html" class="guide-btn btn-6">GUÍA 6 <span>Inflection</span></a>
        <a href="QSG_Unit_7.html" class="guide-btn btn-7">GUÍA 7 <span>Technical English</span></a>
        <a href="QSG_Unit_8.html" class="guide-btn btn-8">GUÍA 8 <span>Final Exam</span></a>

        <!-- Botón de Emergencia Central (MODELOS DE EXAMEN) -->
        <div class="emergency-container">
            <a href="https://drive.google.com/drive/folders/1loafkFjvD7OOkCh7a983rln4RZ3yALEQ?usp=drive_link" class="emergency-btn" id="emergencyButton"></a>
            <div class="emergency-label">MODELOS DE EXAMEN</div>
        </div>
    </div>

    <script>
        // Efecto de parpadeo aleatorio en la pantalla
        setInterval(() => {
            const screen = document.querySelector('.screen');
            screen.style.opacity = Math.random() > 0.98 ? '0.8' : '1';
        }, 100);

        // Interactividad de ojos
        const pupils = document.querySelector('.eye-pupil');
        const buttons = document.querySelectorAll('.guide-btn');

        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                pupils.style.animation = 'none';
                if (btn.classList.contains('btn-1') || btn.classList.contains('btn-2') || btn.classList.contains('btn-3') || btn.classList.contains('btn-4')) {
                    pupils.style.transform = 'translateX(-8px)';
                } else {
                    pupils.style.transform = 'translateX(8px)';
                }
            });

            btn.addEventListener('mouseleave', () => {
                pupils.style.animation = 'lookAround 5s infinite';
                pupils.style.transform = 'translateX(0)';
            });
        });
        
        // ======================
        // SONIDO RETRO-FUTURISTA AL PASAR MOUSE SOBRE BOTÓN AMARILLO
        // ======================
        // Implementación con Web Audio para un "computer beep" sintetizado y estilo retro
        
        let audioContext = null;
        
        // Función para generar un beep corto estilo "ordenador antiguo / sci-fi"
        function playRetroComputerSound() {
            try {
                // Crear AudioContext solo si no existe (inicialización diferida)
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // Reanudar si está suspendido (necesario por políticas de navegador)
                if (audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        actuallyGenerateSound();
                    }).catch(e => console.warn("AudioContext resume error:", e));
                } else {
                    actuallyGenerateSound();
                }
                
                function actuallyGenerateSound() {
                    const now = audioContext.currentTime;
                    
                    // --- Primer componente: tono principal con barrido ascendente (retro futurista)
                    const osc = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    osc.type = 'sawtooth';    // Sonido más agresivo, vintage computer
                    osc.frequency.setValueAtTime(650, now);
                    osc.frequency.exponentialRampToValueAtTime(1150, now + 0.12);
                    
                    gainNode.gain.setValueAtTime(0.25, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    osc.start(now);
                    osc.stop(now + 0.25);
                    
                    // --- Segundo componente: pequeño "chip" más agudo y corto (efecto láser/bit)
                    const osc2 = audioContext.createOscillator();
                    const gain2 = audioContext.createGain();
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(1800, now);
                    osc2.frequency.exponentialRampToValueAtTime(2200, now + 0.07);
                    
                    gain2.gain.setValueAtTime(0.12, now);
                    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
                    
                    osc2.connect(gain2);
                    gain2.connect(audioContext.destination);
                    osc2.start(now);
                    osc2.stop(now + 0.09);
                    
                    // --- Tercer detalle: ruido blanco muy corto (como estática digital)
                    const bufferSize = 4096;
                    const noiseNode = audioContext.createScriptProcessor(bufferSize, 1, 1);
                    const noiseGain = audioContext.createGain();
                    
                    noiseNode.onaudioprocess = function(e) {
                        const output = e.outputBuffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            output[i] = (Math.random() * 2 - 1) * 0.3;
                        }
                    };
                    
                    noiseGain.gain.setValueAtTime(0.08, now);
                    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
                    
                    noiseNode.connect(noiseGain);
                    noiseGain.connect(audioContext.destination);
                    
                    // Desconectar después de un tiempo muy corto para limpiar recursos
                    setTimeout(() => {
                        try {
                            noiseNode.disconnect();
                            noiseGain.disconnect();
                        } catch(e) {}
                    }, 100);
                }
                
            } catch (error) {
                console.warn("Web Audio no disponible o error al reproducir sonido:", error);
                // Fallback silencioso: no rompe la experiencia visual
            }
        }
        
        // Asignar el sonido al botón de emergencia (botón amarillo)
        const emergencyBtn = document.getElementById('emergencyButton');
        if (emergencyBtn) {
            // Al pasar el mouse (hover) -> reproduce el sonido retro futurista
            emergencyBtn.addEventListener('mouseenter', (e) => {
                playRetroComputerSound();
                
                // Pequeño efecto adicional: hacer vibrar sutilmente el ícono de exclamación (feedback)
                const pseudoAfter = window.getComputedStyle(emergencyBtn, '::after');
                // No podemos modificar pseudo-elementos directamente, pero agregamos una clase efímera para efecto extra de brillo
                emergencyBtn.style.transform = 'scale(1.12) rotate(3deg)'; // reforzado por CSS pero añadimos un temblor visual
                setTimeout(() => {
                    // Se restaura sola la transición CSS, no necesitamos resetear manualmente
                }, 120);
            });
            
            // Opcional: pequeño feedback táctil con vibración si se soporta (no indispensable)
            emergencyBtn.addEventListener('touchstart', (e) => {
                // Para móviles: también sonido al tocar (no solo hover)
                playRetroComputerSound();
            });
        }
        
        // Bonus: el label también activa el sonido si alguien hace hover sobre el texto? Por coherencia añadimos también al contenedor? 
        // Para mantener la inmersión, hacemos que el contenedor también active el sonido si se pasa sobre el label (pero no duplicamos)
        const emergencyContainer = document.querySelector('.emergency-container');
        if (emergencyContainer) {
            emergencyContainer.addEventListener('mouseenter', (e) => {
                // Evitar que si el mouse entra exactamente al botón, se dispare dos veces (pero no pasa nada)
                if (e.target === emergencyBtn || emergencyBtn.contains(e.target)) return;
                playRetroComputerSound();
            });
        }
        
        // Añadir un "click" sutil al botón que también podría tener sonido adicional (opcional, pero queda retro)
        if (emergencyBtn) {
            emergencyBtn.addEventListener('click', (e) => {
                // Agregamos un beep extra para confirmación, tipo "comando ejecutado"
                try {
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioContext.state === 'suspended') {
                        audioContext.resume();
                    }
                    const shortBeep = audioContext.createOscillator();
                    const beepGain = audioContext.createGain();
                    shortBeep.type = 'sine';
                    shortBeep.frequency.value = 1200;
                    beepGain.gain.setValueAtTime(0.15, audioContext.currentTime);
                    beepGain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.1);
                    shortBeep.connect(beepGain);
                    beepGain.connect(audioContext.destination);
                    shortBeep.start();
                    shortBeep.stop(audioContext.currentTime + 0.1);
                } catch(err) {}
            });
        }
        
        // (opcional) Pequeña mejora: las pupilas pueden seguir brevemente al botón de emergencia cuando se le hace hover? 
        // efecto sutil: si el mouse entra en emergency, las pupilas miran hacia abajo (hacia el botón)
        if (emergencyBtn && pupils) {
            emergencyBtn.addEventListener('mouseenter', () => {
                pupils.style.animation = 'none';
                pupils.style.transform = 'translateY(8px) scale(0.95)';
            });
            emergencyBtn.addEventListener('mouseleave', () => {
                pupils.style.animation = 'lookAround 5s infinite';
                pupils.style.transform = 'translate(0, 0)';
            });
        }
    </script>
</body>
