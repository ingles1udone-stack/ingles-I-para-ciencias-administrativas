<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Boletín - Inglés I UDO-NE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .udo-blue { color: #003366; }
        .udo-bg-blue { background-color: #003366; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
        <!-- Header del Reproductor -->
        <div class="udo-bg-blue p-6 text-white text-center">
            <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-white/20">
                <i class="fas fa-headphones-alt text-3xl"></i>
            </div>
            <h1 class="text-xl font-bold">Boletín de Bienvenida</h1>
            <p class="text-xs opacity-70 uppercase tracking-widest mt-1">Inglés I - UDO Nueva Esparta</p>
        </div>

        <!-- Controles de Audio -->
        <div class="p-8">
            <div id="status" class="text-center mb-6">
                <p class="text-sm font-medium text-slate-500" id="status-text">Listo para reproducir</p>
            </div>

            <div class="flex flex-col items-center gap-6">
                <!-- Botón Principal -->
                <button id="playBtn" class="w-20 h-20 udo-bg-blue rounded-full text-white text-2xl flex items-center justify-center hover:scale-105 transition-transform shadow-lg disabled:opacity-50">
                    <i class="fas fa-play ml-1" id="playIcon"></i>
                </button>

                <!-- Barra de Progreso -->
                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden relative">
                    <div id="progress" class="absolute top-0 left-0 h-full bg-blue-500 w-0 transition-all duration-300"></div>
                </div>

                <div class="flex justify-between w-full text-[10px] font-bold text-slate-400 uppercase">
                    <span>Voz: Dipper</span>
                    <span>Perfil: Académico</span>
                </div>
            </div>

            <!-- Información Adicional -->
            <div class="mt-8 pt-6 border-t border-slate-100">
                <h2 class="text-xs font-bold text-slate-400 uppercase mb-4 text-center">Resumen del Boletín</h2>
                <div class="space-y-3">
                    <div class="flex items-center gap-3 text-sm text-slate-600">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center udo-blue shrink-0">
                            <i class="fas fa-tools text-xs"></i>
                        </div>
                        <span>Materiales de clase obligatorios.</span>
                    </div>
                    <div class="flex items-center gap-3 text-sm text-slate-600">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center udo-blue shrink-0">
                            <i class="fas fa-phone-alt text-xs"></i>
                        </div>
                        <span>Contacto Centro de Copiado: Prof. Carmen.</span>
                    </div>
                    <div class="flex items-center gap-3 text-sm text-slate-600">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center udo-blue shrink-0">
                            <i class="fas fa-exclamation-triangle text-xs text-orange-500"></i>
                        </div>
                        <span>Regla de las 72 horas para exámenes.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400">Cátedra del Prof. Oney Clavijo</p>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress');

        let audioContext;

        const textToSpeak = `
            Voz clara, masculina y profesional.
            Boletín de Bienvenida al curso de Inglés 1 para Ciencias Administrativas de la UDO Nueva Esparta.
            ¡Bienvenidos a la emocionante aventura del Inglés 1! En la Carrera de Contaduría y Administración, el dominio de los textos en inglés es una herramienta fundamental para desenvolverse en un mundo globalizado. Por ello, la asignatura Inglés 1 se enfoca en la interpretación de textos en inglés de carácter comercial, financiero y contable.
            
            Materiales necesarios para sus actividades en el salón de clase: 
            Un diccionario Inglés-Español-Inglés.
            Una engrapadora miniatura o normal.
            Un cuaderno para sus apuntes.
            Lápices de grafito, 3 creyones de colores diferentes y bolígrafos negro y azul.
            Y las guías impresas del curso disponibles en Google Drive y el Centro de Copiado.
            
            Información sobre la Reproducción de Evaluaciones: El centro de copiado oficial está en el edificio de Cursos Básicos. El contacto es +58 412 5454921, Profesora Carmen. Anótelo y escríbale si requiere copias y no está en la universidad.
            Atención: La reproducción de los exámenes debe solicitarse al menos 72 horas antes de la prueba. El incumplimiento de esto podría causar la pérdida de la evaluación sin derecho a reclamo.
            
            ¿Por qué este centro de copiado? Porque ofrece la calidad, seguridad y responsabilidad necesaria para sus exámenes desde hace años.
            
            Sobre la vestimenta permitida: La UDO no permite ropa indecente en sus aulas. No se permiten tops con huecos, prendas reveladoras, franelillas, shorts, gorras ni piercings en clase.
            
            Para obtener los mejores resultados: Estudie, asista a clases, revise el Plan de Clases periódicamente y consulte al profesor en caso de dudas. ¡Mucho éxito!
        `;

        async function generateAudio() {
            playBtn.disabled = true;
            statusText.innerText = "Generando audio con voz Dipper...";
            
            const payload = {
                contents: [{ parts: [{ text: `Say in a natural, clear male voice: ${textToSpeak}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Dipper" }
                        }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            let retries = 0;
            const maxRetries = 5;

            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API Error');

                    const result = await response.json();
                    const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                    const sampleRateMatch = result.candidates[0].content.parts[0].inlineData.mimeType.match(/rate=(\d+)/);
                    const sampleRate = parseInt(sampleRateMatch ? sampleRateMatch[1] : "24000");
                    
                    await playPCM(base64Audio, sampleRate);
                    return;
                } catch (error) {
                    retries++;
                    const delay = Math.pow(2, retries) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                }
            }
            
            statusText.innerText = "Error. Intente nuevamente.";
            playBtn.disabled = false;
        }

        async function playPCM(base64Data, sampleRate) {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Int16Array(len / 2);
            for (let i = 0; i < len; i += 2) {
                bytes[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
            }

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
            const buffer = audioContext.createBuffer(1, bytes.length, sampleRate);
            buffer.getChannelData(0).set(Array.from(bytes).map(v => v / 32768));

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            
            source.onended = () => {
                playIcon.className = "fas fa-play ml-1";
                statusText.innerText = "Reproducción finalizada";
                playBtn.disabled = false;
                progressBar.style.width = "0%";
            };

            source.start();
            playIcon.className = "fas fa-stop";
            statusText.innerText = "Reproduciendo con Dipper...";
            
            const duration = buffer.duration;
            let start = Date.now();
            const timer = setInterval(() => {
                let elapsed = (Date.now() - start) / 1000;
                let percent = (elapsed / duration) * 100;
                if (percent >= 100) {
                    clearInterval(timer);
                    percent = 100;
                }
                progressBar.style.width = percent + "%";
            }, 100);
        }

        playBtn.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'running') {
                audioContext.close();
                playIcon.className = "fas fa-play ml-1";
                statusText.innerText = "Audio pausado";
                playBtn.disabled = false;
            } else {
                generateAudio();
            }
        });
    </script>
</body>
</html>
