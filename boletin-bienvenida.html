<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Boletín - Inglés I UDO-NE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Share+Tech+Mono&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .udo-blue { color: #003366; }
        .udo-bg-blue { background-color: #003366; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Pantalla Futurista */
        .crt-screen {
            background: #021a02;
            border: 4px solid #1a3a1a;
            box-shadow: inset 0 0 20px #00ff0033, 0 0 10px #00ff0022;
            position: relative;
            overflow: hidden;
        }
        .crt-screen::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }
        .matrix-text {
            font-family: 'Share Tech Mono', monospace;
            color: #00ff41;
            text-shadow: 0 0 8px #00ff41aa;
            line-height: 1.4;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.1);
            position: absolute;
            top: 0;
            animation: scanline 6s linear infinite;
            z-index: 3;
        }
        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
        <!-- Header -->
        <div class="udo-bg-blue p-6 text-white text-center">
            <div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-3 border-2 border-white/20">
                <i class="fas fa-university text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold">Boletín Informativo</h1>
            <p class="text-xs opacity-70 uppercase tracking-widest mt-1">Inglés I - Ciencias Administrativas</p>
        </div>

        <!-- Pantalla de Subtítulos -->
        <div class="px-6 pt-6">
            <div class="crt-screen rounded-xl p-4 h-32 flex items-center justify-center text-center relative">
                <div class="scanline"></div>
                <p id="caption-text" class="matrix-text text-sm md:text-base italic">
                    SISTEMA LISTO... <br> PRESIONE PLAY PARA INICIAR
                </p>
                <div class="absolute top-2 right-3 flex gap-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div>
                    <span class="text-[8px] text-green-900 font-bold uppercase tracking-tighter">Live Text</span>
                </div>
            </div>
        </div>

        <!-- Controles de Audio -->
        <div class="p-8">
            <div id="status" class="text-center mb-6">
                <p class="text-sm font-medium text-slate-500" id="status-text">Voz de Dipper configurada</p>
            </div>

            <div class="flex flex-col items-center gap-6">
                <!-- Botón Principal -->
                <button id="playBtn" class="w-20 h-20 udo-bg-blue rounded-full text-white text-2xl flex items-center justify-center hover:scale-105 transition-transform shadow-lg disabled:opacity-50 relative group">
                    <i class="fas fa-play ml-1" id="playIcon"></i>
                    <div class="absolute -inset-1 bg-blue-400 rounded-full blur opacity-20 group-hover:opacity-40 transition"></div>
                </button>

                <!-- Barra de Progreso -->
                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden relative">
                    <div id="progress" class="absolute top-0 left-0 h-full bg-blue-500 w-0 transition-all duration-300"></div>
                </div>

                <div class="flex justify-between w-full text-[10px] font-bold text-slate-400 uppercase">
                    <span>UDO Nueva Esparta</span>
                    <span>Modo Lectura Activo</span>
                </div>
            </div>

            <!-- Información Adicional -->
            <div class="mt-8 pt-6 border-t border-slate-100">
                <div class="space-y-3">
                    <div class="flex items-center gap-3 text-sm text-slate-600">
                        <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center udo-blue shrink-0">
                            <i class="fas fa-info-circle text-xs"></i>
                        </div>
                        <span class="text-xs">Este audio contiene información vital sobre evaluaciones y materiales.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400">Prof. Oney Clavijo - Semestre 2024</p>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress');
        const captionText = document.getElementById('caption-text');

        let audioContext;
        let captionsInterval;

        // Estructura de subtítulos sincronizada (Tiempos aproximados)
        const captions = [
            { time: 0, text: "Iniciando Boletín de Bienvenida..." },
            { time: 3, text: "Bienvenidos a la aventura de Inglés 1." },
            { time: 7, text: "En Contaduría y Administración, el inglés es fundamental." },
            { time: 12, text: "Interpretaremos textos comerciales, financieros y contables." },
            { time: 18, text: "Materiales necesarios: Diccionario, engrapadora y cuaderno." },
            { time: 24, text: "Recuerde sus lápices, creyones y las guías impresas." },
            { time: 30, text: "Evaluaciones: Centro de copiado en Cursos Básicos." },
            { time: 35, text: "Contacto Prof. Carmen: +58 412 5454921." },
            { time: 41, text: "¡OJO! Pida sus exámenes 72 horas antes." },
            { time: 47, text: "El incumplimiento causa la pérdida del examen." },
            { time: 53, text: "Usamos este centro por su calidad y seguridad." },
            { time: 58, text: "Vestimenta: No se permite ropa reveladora ni gorras." },
            { time: 64, text: "Estudie, asista a clases y consulte sus dudas." },
            { time: 70, text: "¡Mucho éxito en este semestre!" }
        ];

        const textToSpeak = `
            Boletín de Bienvenida al curso de Inglés 1 para Ciencias Administrativas de la UDO Nueva Esparta.
            ¡Bienvenidos a la emocionante aventura del Inglés 1! En la Carrera de Contaduría y Administración, el dominio de los textos en inglés es una herramienta fundamental para desenvolverse en un mundo globalizado. Por ello, la asignatura Inglés 1 se enfoca en la interpretación de textos en inglés de carácter comercial, financiero y contable.
            
            Materiales necesarios para sus actividades en el salón de clase: 
            Un diccionario Inglés-Español-Inglés, una engrapadora, un cuaderno, lápices, 3 creyones y las guías impresas del curso.
            
            Sobre evaluaciones: El centro de copiado oficial está en Cursos Básicos. El contacto es Profesora Carmen, al cero cuatro doce, cinco cuatro cinco, cuatro nueve dos uno.
            Atención: La reproducción de los exámenes debe solicitarse 72 horas antes. El incumplimiento causará la pérdida de la evaluación sin derecho a reclamo.
            
            ¿Por qué este centro de copiado? Porque ofrece calidad, seguridad y responsabilidad.
            Sobre la vestimenta: La UDO no permite ropa reveladora, franelillas, shorts, gorras ni piercings en clase.
            Para obtener resultados: Estudie, asista a clases y consulte al profesor. ¡Mucho éxito!
        `;

        async function generateAudio() {
            playBtn.disabled = true;
            statusText.innerText = "Sincronizando sistema...";
            captionText.innerText = "> ACCEDIENDO A SERVIDORES...";
            
            const payload = {
                contents: [{ parts: [{ text: `Say in a professional, clear, and slightly deep male voice: ${textToSpeak}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Dipper" }
                        }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            let retries = 0;
            const maxRetries = 5;

            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API Error');

                    const result = await response.json();
                    const base64Audio = result.candidates[0].content.parts[0].inlineData.data;
                    const sampleRateMatch = result.candidates[0].content.parts[0].inlineData.mimeType.match(/rate=(\d+)/);
                    const sampleRate = parseInt(sampleRateMatch ? sampleRateMatch[1] : "24000");
                    
                    await playPCM(base64Audio, sampleRate);
                    return;
                } catch (error) {
                    retries++;
                    const delay = Math.pow(2, retries) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                }
            }
            
            statusText.innerText = "Error de conexión.";
            captionText.innerText = "> ERROR: FALLO DE SEÑAL";
            playBtn.disabled = false;
        }

        async function playPCM(base64Data, sampleRate) {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Int16Array(len / 2);
            for (let i = 0; i < len; i += 2) {
                bytes[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
            }

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
            const buffer = audioContext.createBuffer(1, bytes.length, sampleRate);
            buffer.getChannelData(0).set(Array.from(bytes).map(v => v / 32768));

            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            
            source.onended = () => {
                playIcon.className = "fas fa-play ml-1";
                statusText.innerText = "Fin de transmisión";
                captionText.innerText = "SISTEMA LISTO... \n PRESIONE PLAY PARA INICIAR";
                playBtn.disabled = false;
                progressBar.style.width = "0%";
                clearInterval(captionsInterval);
            };

            source.start();
            playIcon.className = "fas fa-stop";
            statusText.innerText = "Transmisión en curso...";
            
            const duration = buffer.duration;
            let start = Date.now();
            
            captionsInterval = setInterval(() => {
                let elapsed = (Date.now() - start) / 1000;
                let percent = (elapsed / duration) * 100;
                
                // Actualizar Barra
                if (percent >= 100) percent = 100;
                progressBar.style.width = percent + "%";

                // Actualizar Subtítulos
                const currentCaption = [...captions].reverse().find(c => elapsed >= c.time);
                if (currentCaption) {
                    captionText.innerText = `> ${currentCaption.text.toUpperCase()}`;
                }
            }, 100);
        }

        playBtn.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'running') {
                audioContext.close();
                clearInterval(captionsInterval);
                playIcon.className = "fas fa-play ml-1";
                statusText.innerText = "Transmisión pausada";
                captionText.innerText = "> PAUSA: ESPERANDO ÓRDENES";
                playBtn.disabled = false;
            } else {
                generateAudio();
            }
        });
    </script>
</body>
</html>
